<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>METRO DURAK ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        casino: {
                            felt: '#1a472a',
                            gold: '#d4af37',
                            goldLight: '#f9e498',
                            dark: '#050505',
                            accent: '#e63946'
                        }
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        :root { --card-w: 75px; --card-h: 110px; }
        @media (max-width: 640px) { :root { --card-w: 60px; --card-h: 88px; } }

        body { background-color: #050505; color: white; user-select: none; overflow: hidden; height: 100vh; font-family: 'Montserrat', sans-serif; }
        
        /* Игровое сукно */
        .casino-table {
            background: radial-gradient(circle at center, #2d5a3f 0%, #1a472a 70%, #0d2616 100%);
            position: relative;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        .casino-table::after {
            content: ""; position: absolute; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            opacity: 0.15; pointer-events: none;
        }

        /* Карты */
        .card-container {
            width: var(--card-w); height: var(--card-h);
            perspective: 1000px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: absolute;
        }
        .card-inner {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 5px; font-weight: 900; background: white; color: #1a1a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid rgba(0,0,0,0.1);
        }
        .card-back {
            background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
            transform: rotateY(180deg); display: flex; align-items: center; justify-content: center;
            border: 3px solid white;
        }
        .card-back::after {
            content: "M"; font-size: 2rem; color: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            width: 80%; height: 80%; display: flex; align-items: center; justify-content: center; border-radius: 4px;
        }

        .card-container.flipped .card-inner { transform: rotateY(180deg); }
        .card-container.playable:hover { transform: translateY(-20px) scale(1.05); z-index: 100 !important; cursor: pointer; }
        .card-container.playable:hover .card-face { box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); border-color: #d4af37; }

        .suit-icon { font-size: 1.4rem; line-height: 1; }
        .suit-center { font-size: 2.5rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.1; }
        .card-red { color: #e63946; }

        /* Зоны */
        #playerHand { bottom: 30px; height: var(--card-h); width: 100%; }
        #aiHand { top: 80px; height: var(--card-h); width: 100%; }
        #battleZone { top: 48%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 220px; }

        /* Анимации */
        @keyframes dealIn { from { transform: translate(500px, -500px) rotate(180deg); opacity: 0; } to { opacity: 1; } }
        .anim-deal { animation: dealIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) backwards; }

        /* Ставки и UI */
        .chip { 
            width: 60px; height: 60px; border-radius: 50%; border: 4px dashed rgba(255,255,255,0.4);
            background: radial-gradient(circle at center, var(--tw-gradient-from), var(--tw-gradient-to));
            display: flex; align-items: center; justify-content: center; font-weight: 900;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.1s; cursor: pointer;
        }
        .chip:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }

        .gold-button {
            background: linear-gradient(to bottom, #f9e498 0%, #d4af37 100%);
            color: #453200; text-shadow: 0 1px 0 rgba(255,255,255,0.4);
            box-shadow: 0 4px 0 #8a6d1d, 0 8px 15px rgba(0,0,0,0.4);
        }
        .gold-button:active { transform: translateY(3px); box-shadow: 0 1px 0 #8a6d1d; }

        .thinking-dots::after { content: ''; animation: dots 1.5s infinite; }
        @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }

        .glass { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col relative overflow-hidden">

    <!-- HUD -->
    <header class="fixed top-0 w-full z-50 glass px-4 py-3 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-4">
            <button onclick="Game.exit()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="hidden sm:block">
                <div class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Режим игры</div>
                <div class="text-sm font-black text-casino-gold">ELITE DURAK</div>
            </div>
        </div>

        <div id="turnIndicator" class="bg-white/5 px-6 py-2 rounded-full border border-white/10 flex items-center gap-3">
            <div id="turnDot" class="w-2 h-2 rounded-full bg-casino-gold animate-pulse"></div>
            <span id="turnText" class="text-xs font-black uppercase tracking-widest">Ожидание</span>
        </div>

        <div class="text-right">
            <div class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Баланс</div>
            <div id="gameBalance" class="text-lg font-black text-white">5,000 ₽</div>
        </div>
    </header>

    <main class="flex-1 casino-table">
        
        <!-- Deck & Trump -->
        <div class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col items-center gap-2">
            <div id="deckContainer" class="relative w-[var(--card-w)] h-[var(--card-h)]">
                <!-- Козырь -->
                <div id="trumpCard" class="absolute top-0 left-0"></div>
                <!-- Стопка колоды -->
                <div id="deckStack" class="absolute top-0 left-0 -translate-x-2"></div>
            </div>
            <div id="cardsLeft" class="bg-black/60 px-3 py-1 rounded-full text-[10px] font-black border border-white/20">36</div>
        </div>

        <!-- Battle Zone -->
        <div id="battleZone" class="flex flex-wrap justify-center content-center gap-4"></div>

        <!-- Hands -->
        <div id="aiHand" class="flex justify-center items-start opacity-80"></div>
        <div id="playerHand" class="flex justify-center items-end"></div>

        <!-- Action Button -->
        <div id="actionArea" class="absolute bottom-40 left-1/2 -translate-x-1/2 z-40 hidden">
            <button id="actionBtn" onclick="Game.playerAction()" class="gold-button px-10 py-4 rounded-2xl font-black text-lg tracking-tighter transition-all">
                БИТО
            </button>
        </div>

    </main>

    <!-- Bet Screen -->
    <div id="betScreen" class="fixed inset-0 z-[100] flex items-center justify-center glass">
        <div class="w-full max-w-md p-8 text-center">
            <div class="mb-8">
                <div class="text-casino-gold text-5xl mb-2"><i class="fa-solid fa-crown"></i></div>
                <h1 class="text-3xl font-black italic tracking-tighter">METRO <span class="text-casino-gold">DURAK</span></h1>
                <p class="text-gray-400 text-xs tracking-widest uppercase">Premium Club Edition</p>
            </div>

            <div class="bg-black/40 rounded-3xl p-6 border border-white/5 mb-8">
                <div class="text-gray-400 text-[10px] uppercase font-black mb-2 tracking-widest">Ваша Ставка</div>
                <div id="currentBet" class="text-5xl font-black text-white mb-6">0 <span class="text-casino-gold">₽</span></div>
                
                <div class="flex justify-between gap-4">
                    <div onclick="Game.addBet(100)" class="chip from-blue-600 to-blue-800">100</div>
                    <div onclick="Game.addBet(500)" class="chip from-purple-600 to-purple-800">500</div>
                    <div onclick="Game.addBet(1000)" class="chip from-yellow-500 to-yellow-700 text-black">1K</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="Game.clearBet()" class="bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-bold transition">СБРОС</button>
                <button onclick="Game.startGame()" class="gold-button py-4 rounded-2xl font-black">В ИГРУ</button>
            </div>
        </div>
    </div>

    <!-- Win/Loss Overlay -->
    <div id="resultScreen" class="fixed inset-0 z-[110] hidden glass items-center justify-center">
        <div class="text-center">
            <div id="resultIcon" class="text-8xl mb-6"></div>
            <h2 id="resultTitle" class="text-6xl font-black mb-2 tracking-tighter"></h2>
            <p id="resultText" class="text-xl text-gray-400 mb-8"></p>
            <button onclick="location.reload()" class="gold-button px-12 py-5 rounded-2xl font-black text-xl">ПРОДОЛЖИТЬ</button>
        </div>
    </div>

    <script>
        const suits = [
            { s: '♠', name: 'spades', isRed: false },
            { s: '♣', name: 'clubs', isRed: false },
            { s: '♥', name: 'hearts', isRed: true },
            { s: '♦', name: 'diamonds', isRed: true }
        ];
        const ranks = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        const rVals = {'6':6,'7':7,'8':8,'9':9,'10':10,'J':11,'Q':12,'K':13,'A':14};

        let db = JSON.parse(localStorage.getItem('metro_db')) || { balance: 10000 };

        const Game = {
            deck: [], playerHand: [], aiHand: [], table: [], 
            trump: null, bet: 0, turn: 'player', state: 'betting',

            init() {
                this.updateBalance();
            },

            updateBalance() {
                document.getElementById('gameBalance').textContent = db.balance.toLocaleString() + ' ₽';
            },

            addBet(val) {
                if(db.balance >= val) {
                    this.bet += val;
                    db.balance -= val;
                    document.getElementById('currentBet').textContent = this.bet;
                    this.updateBalance();
                }
            },

            clearBet() {
                db.balance += this.bet;
                this.bet = 0;
                document.getElementById('currentBet').textContent = 0;
                this.updateBalance();
            },

            exit() {
                localStorage.setItem('metro_db', JSON.stringify(db));
                window.location.href = 'index.html';
            },

            startGame() {
                if(this.bet <= 0) return;
                document.getElementById('betScreen').style.display = 'none';
                this.state = 'playing';
                this.buildDeck();
                this.dealInitial();
            },

            buildDeck() {
                this.deck = [];
                suits.forEach(s => {
                    ranks.forEach(r => {
                        this.deck.push({ ...s, rank: r, val: rVals[r] });
                    });
                });
                for (let i = this.deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
                }
                this.trump = this.deck[0];
            },

            dealInitial() {
                for(let i=0; i<6; i++) {
                    this.playerHand.push(this.deck.pop());
                    this.aiHand.push(this.deck.pop());
                }
                this.renderAll();
                this.turn = Math.random() > 0.5 ? 'player' : 'ai';
                if(this.turn === 'ai') setTimeout(() => this.aiAttack(), 1500);
            },

            createCardEl(card, isHidden = false, index = -1, type = 'hand') {
                const container = document.createElement('div');
                container.className = `card-container anim-deal ${isHidden ? 'flipped' : ''} ${card && this.canPlay(card) && type==='hand' ? 'playable' : ''}`;
                
                if(card && type === 'hand') {
                    container.onclick = () => this.playCard(index);
                }

                const redClass = card?.isRed ? 'card-red' : '';
                
                container.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face ${redClass}">
                            <div class="flex flex-col leading-none">
                                <span>${card?.rank || ''}</span>
                                <span class="text-xs">${card?.s || ''}</span>
                            </div>
                            <div class="suit-center">${card?.s || ''}</div>
                            <div class="flex flex-col leading-none self-end rotate-180">
                                <span>${card?.rank || ''}</span>
                                <span class="text-xs">${card?.s || ''}</span>
                            </div>
                        </div>
                        <div class="card-back"></div>
                    </div>
                `;
                return container;
            },

            renderAll() {
                const pHand = document.getElementById('playerHand');
                const aHand = document.getElementById('aiHand');
                const bZone = document.getElementById('battleZone');
                const tCard = document.getElementById('trumpCard');
                const dStack = document.getElementById('deckStack');

                pHand.innerHTML = '';
                aHand.innerHTML = '';
                bZone.innerHTML = '';

                // Hand Rendering
                this.playerHand.sort((a,b) => (a.s === this.trump.s ? a.val + 20 : a.val) - (b.s === this.trump.s ? b.val + 20 : b.val));
                
                this.playerHand.forEach((c, i) => {
                    const el = this.createCardEl(c, false, i, 'hand');
                    const offset = (i - (this.playerHand.length-1)/2) * (window.innerWidth < 600 ? 40 : 55);
                    const rot = (i - (this.playerHand.length-1)/2) * 4;
                    el.style.left = `calc(50% + ${offset}px - (var(--card-w)/2))`;
                    el.style.transform = `rotate(${rot}deg)`;
                    pHand.appendChild(el);
                });

                this.aiHand.forEach((c, i) => {
                    const el = this.createCardEl(c, true, -1, 'ai');
                    const offset = (i - (this.aiHand.length-1)/2) * 30;
                    el.style.left = `calc(50% + ${offset}px - (var(--card-w)/2))`;
                    aHand.appendChild(el);
                });

                // Battle Zone Rendering
                this.table.forEach((pair, i) => {
                    const group = document.createElement('div');
                    group.className = 'relative w-[var(--card-w)] h-[var(--card-h)] mx-2';
                    
                    const atk = this.createCardEl(pair.atk, false, -1, 'table');
                    atk.style.position = 'absolute';
                    group.appendChild(atk);

                    if(pair.def) {
                        const def = this.createCardEl(pair.def, false, -1, 'table');
                        def.style.position = 'absolute';
                        def.style.transform = 'translate(15px, 15px) rotate(5deg)';
                        group.appendChild(def);
                    }
                    bZone.appendChild(group);
                });

                // Trump & Deck
                tCard.innerHTML = '';
                if(this.deck.length > 0) {
                    const tc = this.createCardEl(this.trump, false, -1, 'deck');
                    tc.style.transform = 'rotate(90deg) translate(0, 30px)';
                    tCard.appendChild(tc);
                }

                dStack.innerHTML = '';
                if(this.deck.length > 1) {
                    const ds = this.createCardEl(null, true, -1, 'deck');
                    dStack.appendChild(ds);
                }

                document.getElementById('cardsLeft').textContent = this.deck.length;

                // UI Status
                const dot = document.getElementById('turnDot');
                const txt = document.getElementById('turnText');
                const actionBtn = document.getElementById('actionBtn');
                const actionArea = document.getElementById('actionArea');

                if(this.turn === 'player') {
                    dot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
                    if(this.table.length > 0 && !this.table[this.table.length-1].def) {
                        txt.textContent = "Защищайтесь";
                        actionBtn.textContent = "ВЗЯТЬ";
                        actionArea.classList.remove('hidden');
                    } else {
                        txt.textContent = "Ваш ход";
                        actionBtn.textContent = "БИТО";
                        actionArea.classList.toggle('hidden', this.table.length === 0);
                    }
                } else {
                    dot.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]";
                    txt.className = "text-xs font-black uppercase tracking-widest thinking-dots";
                    txt.textContent = "Бот думает";
                    actionArea.classList.add('hidden');
                }
            },

            canPlay(card) {
                if(this.turn === 'player') {
                    // Атака
                    if(this.table.length === 0) return true;
                    // Подкидывание
                    if(this.table.length > 0 && this.table[this.table.length-1].def) {
                        const ranks = [];
                        this.table.forEach(p => { ranks.push(p.atk.rank); if(p.def) ranks.push(p.def.rank); });
                        return ranks.includes(card.rank);
                    }
                    // Защита
                    if(this.table.length > 0 && !this.table[this.table.length-1].def) {
                        const atk = this.table[this.table.length-1].atk;
                        if(card.s === atk.s && card.val > atk.val) return true;
                        if(card.s === this.trump.s && atk.s !== this.trump.s) return true;
                        return false;
                    }
                }
                return false;
            },

            playCard(idx) {
                if(this.turn !== 'player' || this.state !== 'playing') return;
                const card = this.playerHand[idx];
                if(!this.canPlay(card)) return;

                this.playerHand.splice(idx, 1);
                if(this.table.length > 0 && !this.table[this.table.length-1].def) {
                    this.table[this.table.length-1].def = card;
                    this.turn = 'ai';
                    this.renderAll();
                    setTimeout(() => this.aiDecision(), 1000);
                } else {
                    this.table.push({ atk: card, def: null });
                    this.turn = 'ai';
                    this.renderAll();
                    setTimeout(() => this.aiDefend(), 1000);
                }
            },

            playerAction() {
                if(this.turn !== 'player') return;
                if(this.table.length > 0 && !this.table[this.table.length-1].def) {
                    // Взять
                    this.table.forEach(p => { this.playerHand.push(p.atk); if(p.def) this.playerHand.push(p.def); });
                    this.table = [];
                    this.replenish();
                    this.turn = 'ai';
                    this.renderAll();
                    setTimeout(() => this.aiAttack(), 1500);
                } else {
                    // Бито
                    this.table = [];
                    this.replenish();
                    this.turn = 'ai';
                    this.renderAll();
                    setTimeout(() => this.aiAttack(), 1500);
                }
            },

            aiAttack() {
                if(this.state !== 'playing' || this.aiHand.length === 0) return;
                let bestIdx = -1;
                let minVal = 100;
                this.aiHand.forEach((c, i) => {
                    let v = c.s === this.trump.s ? c.val + 20 : c.val;
                    if(v < minVal) { minVal = v; bestIdx = i; }
                });

                if(bestIdx !== -1) {
                    this.table.push({ atk: this.aiHand.splice(bestIdx, 1)[0], def: null });
                    this.turn = 'player';
                    this.renderAll();
                }
            },

            aiDefend() {
                if(this.state !== 'playing') return;
                const atk = this.table[this.table.length-1].atk;
                let bestIdx = -1;
                let minVal = 100;

                this.aiHand.forEach((c, i) => {
                    let canBeat = (c.s === atk.s && c.val > atk.val) || (c.s === this.trump.s && atk.s !== this.trump.s);
                    if(canBeat) {
                        let v = c.s === this.trump.s ? c.val + 20 : c.val;
                        if(v < minVal) { minVal = v; bestIdx = i; }
                    }
                });

                if(bestIdx !== -1) {
                    this.table[this.table.length-1].def = this.aiHand.splice(bestIdx, 1)[0];
                    this.turn = 'player';
                    this.renderAll();
                    setTimeout(() => this.aiDecision(), 1500);
                } else {
                    // AI берет
                    this.table.forEach(p => { this.aiHand.push(p.atk); if(p.def) this.aiHand.push(p.def); });
                    this.table = [];
                    this.replenish();
                    this.turn = 'player';
                    this.renderAll();
                }
            },

            aiDecision() {
                // Подкинуть или бито?
                const onTable = [];
                this.table.forEach(p => { onTable.push(p.atk.rank); if(p.def) onTable.push(p.def.rank); });
                
                let toThrow = this.aiHand.findIndex(c => onTable.includes(c.rank) && c.s !== this.trump.s);
                
                if(toThrow !== -1 && this.table.length < 6) {
                    this.table.push({ atk: this.aiHand.splice(toThrow, 1)[0], def: null });
                    this.turn = 'player';
                    this.renderAll();
                } else {
                    this.table = [];
                    this.replenish();
                    this.turn = 'player';
                    this.renderAll();
                }
            },

            replenish() {
                while(this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while(this.aiHand.length < 6 && this.deck.length > 0) this.aiHand.push(this.deck.pop());
                this.checkGameOver();
            },

            checkGameOver() {
                if(this.deck.length === 0) {
                    if(this.playerHand.length === 0 && this.aiHand.length === 0) this.endGame('draw');
                    else if(this.playerHand.length === 0) this.endGame('win');
                    else if(this.aiHand.length === 0) this.endGame('lose');
                }
            },

            endGame(res) {
                this.state = 'over';
                const screen = document.getElementById('resultScreen');
                const icon = document.getElementById('resultIcon');
                const title = document.getElementById('resultTitle');
                const text = document.getElementById('resultText');

                screen.style.display = 'flex';
                
                if(res === 'win') {
                    const winAmt = this.bet * 2;
                    db.balance += winAmt;
                    icon.innerHTML = '🏆';
                    title.textContent = "ПОБЕДА";
                    title.className = "text-6xl font-black mb-2 text-casino-gold";
                    text.textContent = `Ваш выигрыш: ${winAmt.toLocaleString()} ₽`;
                } else if(res === 'lose') {
                    icon.innerHTML = '💀';
                    title.textContent = "ПРОИГРЫШ";
                    title.className = "text-6xl font-black mb-2 text-red-600";
                    text.textContent = `Вы потеряли ${this.bet.toLocaleString()} ₽`;
                } else {
                    db.balance += this.bet;
                    icon.innerHTML = '🤝';
                    title.textContent = "НИЧЬЯ";
                    title.className = "text-6xl font-black mb-2 text-white";
                    text.textContent = "Ставка возвращена";
                }
                localStorage.setItem('metro_db', JSON.stringify(db));
            }
        };

        window.onload = () => Game.init();
    </script>
</body>
</html>
