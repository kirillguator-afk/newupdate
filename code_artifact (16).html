<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>METRO DURAK P2P | NEXUS ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        metro: { 
                            black: '#050505', 
                            dark: '#0a0a0a', 
                            accent: '#fbbf24',
                            gold: '#d97706',
                            emerald: '#10b981',
                            rose: '#f43f5e',
                            slate: '#1e293b',
                            muted: '#52525b'
                        }
                    },
                    boxShadow: {
                        'premium': '0 25px 50px -12px rgba(0, 0, 0, 0.8)',
                        'glow': '0 0 20px rgba(251, 191, 36, 0.3)',
                        'accent-glow': '0 0 30px rgba(251, 191, 36, 0.4)'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #050505);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --card-w: 74px;
            --card-h: 108px;
        }

        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .arena-surface {
            background: 
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.12) 0%, transparent 80%),
                radial-gradient(circle at 0% 100%, rgba(251, 191, 36, 0.03) 0%, transparent 40%),
                #050505;
            position: relative;
            height: 100%;
        }

        .arena-surface::after {
            content: ""; position: absolute; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            opacity: 0.03; pointer-events: none;
        }

        /* Card Component Architecture */
        .card-node {
            width: var(--card-w);
            height: var(--card-h);
            position: absolute;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            perspective: 1200px;
            cursor: pointer;
            z-index: 10;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 12px;
            background: #ffffff;
            color: #1a1a1a;
            padding: 8px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(0,0,0,0.05);
            font-weight: 800;
        }

        .card-back {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            transform: rotateY(180deg);
            border: 3px solid #ffffff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .card-back::after {
            content: "M"; font-size: 2.5rem; color: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            width: 80%; height: 80%; display: flex; align-items: center; justify-content: center; border-radius: 8px;
        }

        .is-flipped .card-inner { transform: rotateY(180deg); }
        .card-red { color: #e11d48; }
        
        .playable:hover { transform: translateY(-28px) scale(1.08) !important; z-index: 150 !important; }
        .playable:active { transform: translateY(-15px) scale(0.95) !important; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-action {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #050505;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 15px 35px rgba(217, 119, 6, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-action:active { transform: scale(0.94); opacity: 0.9; }
        .btn-action:disabled { filter: grayscale(1); opacity: 0.3; cursor: not-allowed; transform: scale(0.98); }

        #battle-grid {
            position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%);
            width: 92%; height: 280px; display: flex; justify-content: center; align-items: center; gap: 14px;
            flex-wrap: wrap;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 8px;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
        .active-turn-glow { animation: pulse-glow 2s infinite; }

        .shimmer {
            position: relative; overflow: hidden;
        }
        .shimmer::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shimmer-anim 3s infinite;
        }
        @keyframes shimmer-anim { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
    </style>
</head>
<body class="arena-surface">

    <!-- HUD Layer -->
    <header class="fixed top-0 w-full z-50 px-6 py-6 flex justify-between items-center bg-black/40 backdrop-blur-2xl border-b border-white/5">
        <div class="flex items-center gap-4">
            <button onclick="NexusDurak.exit()" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center border border-white/10 active:scale-90 transition shadow-inner">
                <i class="fa-solid fa-chevron-left text-metro-accent"></i>
            </button>
            <div>
                <div class="text-[9px] text-metro-muted font-black uppercase tracking-[0.3em] leading-none mb-1.5">P2P Protocol</div>
                <div id="net-status" class="text-[11px] font-black text-white flex items-center">
                    <span class="status-dot bg-metro-muted"></span>
                    OFFLINE
                </div>
            </div>
        </div>
        <div class="text-right">
            <span class="text-[9px] text-metro-muted font-black uppercase tracking-widest block mb-1">Vault Balance</span>
            <div class="font-black text-white text-xl tracking-tighter" id="ui-balance">0 ₽</div>
        </div>
    </header>

    <!-- Game Arena -->
    <main class="relative h-full w-full pt-28 pb-44">
        <!-- Opponent Hand -->
        <div id="opponent-hand" class="absolute top-32 left-0 right-0 h-[var(--card-h)] flex justify-center pointer-events-none"></div>

        <!-- Deck & Trump -->
        <div class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col items-center gap-5 z-20">
            <div id="deck-area" class="relative w-[var(--card-w)] h-[var(--card-h)]">
                <div id="trump-slot" class="absolute inset-0"></div>
                <div id="deck-stack" class="absolute inset-0 -translate-x-2.5 -translate-y-1"></div>
            </div>
            <div id="deck-count" class="bg-black/80 backdrop-blur-xl px-5 py-2 rounded-full text-[10px] font-black border border-white/10 shadow-premium text-metro-accent">0</div>
        </div>

        <!-- Battle Zone -->
        <div id="battle-grid"></div>

        <!-- Player Hand -->
        <div id="player-hand" class="absolute bottom-40 left-0 right-0 h-[var(--card-h)] flex justify-center"></div>

        <!-- Action Bar -->
        <div id="action-bar" class="absolute bottom-12 left-0 right-0 px-10 flex justify-center gap-4 z-40 opacity-0 translate-y-12 transition-all duration-700">
            <button id="btn-action" onclick="Engine.handleAction()" class="btn-action w-full max-w-md py-6 rounded-[2rem] text-lg italic tracking-tighter shimmer">
                БИТО
            </button>
        </div>
    </main>

    <!-- Connection Overlay -->
    <div id="overlay-connect" class="fixed inset-0 z-[100] glass-panel flex items-center justify-center p-10">
        <div class="w-full max-w-sm text-center space-y-10">
            <div class="relative inline-block">
                <div class="w-28 h-28 bg-metro-accent/10 rounded-[3rem] flex items-center justify-center border border-metro-accent/20 mx-auto shadow-accent-glow">
                    <i class="fa-solid fa-tower-broadcast text-5xl text-metro-accent animate-pulse"></i>
                </div>
            </div>
            
            <div>
                <h2 class="text-5xl font-black italic tracking-tighter uppercase">Durak <span class="text-metro-accent">Elite</span></h2>
                <p class="text-metro-muted text-[10px] font-black uppercase tracking-[0.5em] mt-4">Nexus P2P Network</p>
            </div>

            <div class="bg-black/60 rounded-[3.5rem] p-10 border border-white/5 shadow-premium">
                <div class="mb-10">
                    <span class="text-[10px] font-black text-metro-muted uppercase tracking-widest block mb-4">Table Stake</span>
                    <div class="text-6xl font-black text-white tracking-tighter" id="ui-bet">0 <span class="text-metro-accent text-3xl">₽</span></div>
                </div>
                
                <div class="flex justify-between items-center gap-4 mb-10">
                    <div onclick="Engine.adjustBet(100)" class="flex-1 py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black hover:bg-white/10 transition cursor-pointer uppercase tracking-widest">100</div>
                    <div onclick="Engine.adjustBet(500)" class="flex-1 py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black hover:bg-white/10 transition cursor-pointer uppercase tracking-widest">500</div>
                    <div onclick="Engine.adjustBet(1000)" class="flex-1 py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black hover:bg-white/10 transition cursor-pointer uppercase tracking-widest">1K</div>
                </div>

                <button id="btn-connect" onclick="Network.connect()" class="btn-action w-full py-6 rounded-3xl text-sm shimmer">
                    FIND OPPONENT
                </button>
            </div>
        </div>
    </div>

    <!-- Result Overlay -->
    <div id="overlay-result" class="fixed inset-0 z-[110] hidden glass-panel flex items-center justify-center p-10">
        <div class="text-center animate-in fade-in zoom-in duration-500">
            <div id="res-icon" class="text-[10rem] mb-8 drop-shadow-[0_0_40px_rgba(251,191,36,0.6)]">🏆</div>
            <h2 id="res-title" class="text-8xl font-black italic tracking-tighter mb-6">VICTORY</h2>
            <p id="res-desc" class="text-metro-muted font-black mb-16 uppercase tracking-[0.3em]">You earned 2,000 ₽</p>
            <button onclick="location.reload()" class="btn-action px-20 py-7 rounded-[2.5rem] text-xl shimmer">NEW SESSION</button>
        </div>
    </div>

    <script>
        /**
         * NEXUS ARCHITECT - DURAK P2P ENGINE v2.0
         * Refactored for performance, modularity, and Metro Cash aesthetics.
         */

        const TG = window.Telegram?.WebApp;
        const SUITS = [
            { s: '♠', id: 'spades', red: false },
            { s: '♣', id: 'clubs', red: false },
            { s: '♥', id: 'hearts', red: true },
            { s: '♦', id: 'diamonds', red: true }
        ];
        const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        const RANK_VAL = { '6': 6, '7': 7, '8': 8, '9': 9, '10': 10, 'J': 11, 'Q': 12, 'K': 13, 'A': 14 };

        const NexusDurak = {
            vault: JSON.parse(localStorage.getItem('metro_vault')) || { balance: 5000, turnover: 0, wins: 0 },
            
            init() {
                if (TG) {
                    TG.ready();
                    TG.expand();
                    TG.headerColor = '#050505';
                }
                this.syncUI();
            },

            syncUI() {
                document.getElementById('ui-balance').textContent = this.vault.balance.toLocaleString() + ' ₽';
                localStorage.setItem('metro_vault', JSON.stringify(this.vault));
            },

            haptic(type = 'light') {
                if (!TG) return;
                if (['success', 'warning', 'error'].includes(type)) TG.HapticFeedback.notificationOccurred(type);
                else TG.HapticFeedback.impactOccurred(type);
            },

            exit() {
                window.location.href = 'metro_cash_app.html';
            }
        };

        const Network = {
            peer: null,
            role: null,
            status: 'disconnected',

            async connect() {
                if (Engine.bet <= 0) return;
                
                const btn = document.getElementById('btn-connect');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-3"></i> SEARCHING...';
                
                NexusDurak.haptic('medium');

                // Simulated P2P Handshake
                setTimeout(() => {
                    this.status = 'connected';
                    this.role = Math.random() > 0.5 ? 'host' : 'guest';
                    this.onConnected();
                }, 2200);
            },

            onConnected() {
                document.getElementById('net-status').innerHTML = `<span class="status-dot bg-metro-emerald animate-pulse"></span> ONLINE | ${this.role.toUpperCase()}`;
                document.getElementById('overlay-connect').style.display = 'none';
                Engine.initGame();
            },

            send(type, data) {
                // Simulated network latency for P2P feel
                setTimeout(() => this.onMessage({ type, data }), 200);
            },

            onMessage(msg) {
                switch(msg.type) {
                    case 'SYNC_STATE': Engine.syncState(msg.data); break;
                    case 'MOVE': Engine.onRemoteMove(msg.data); break;
                    case 'ACTION': Engine.onRemoteAction(msg.data); break;
                }
            }
        };

        const Engine = {
            deck: [],
            playerHand: [],
            opponentHand: [],
            table: [],
            trump: null,
            bet: 0,
            turn: null, // 'me' or 'peer'
            isAttacker: false,
            gameState: 'waiting',

            adjustBet(val) {
                if (NexusDurak.vault.balance >= val) {
                    this.bet += val;
                    NexusDurak.vault.balance -= val;
                    NexusDurak.haptic('light');
                    document.getElementById('ui-bet').textContent = this.bet.toLocaleString();
                    NexusDurak.syncUI();
                }
            },

            initGame() {
                this.gameState = 'playing';
                if (Network.role === 'host') {
                    this.buildDeck();
                    this.deal();
                    this.determineFirstTurn();
                    this.broadcastState();
                }
                this.render();
            },

            buildDeck() {
                this.deck = [];
                SUITS.forEach(s => RANKS.forEach(r => this.deck.push({ ...s, rank: r, val: RANK_VAL[r] })));
                for (let i = this.deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
                }
                this.trump = this.deck[0];
            },

            deal() {
                while (this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while (this.opponentHand.length < 6 && this.deck.length > 0) this.opponentHand.push(this.deck.pop());
            },

            determineFirstTurn() {
                const myMinTrump = Math.min(...this.playerHand.filter(c => c.s === this.trump.s).map(c => c.val), 100);
                const peerMinTrump = Math.min(...this.opponentHand.filter(c => c.s === this.trump.s).map(c => c.val), 100);
                this.turn = myMinTrump <= peerMinTrump ? 'me' : 'peer';
                this.isAttacker = (this.turn === 'me');
            },

            broadcastState() {
                Network.send('SYNC_STATE', {
                    deck: this.deck,
                    playerHand: this.opponentHand,
                    opponentHand: this.playerHand,
                    trump: this.trump,
                    turn: this.turn === 'me' ? 'peer' : 'me',
                    isAttacker: !this.isAttacker,
                    table: this.table
                });
            },

            syncState(data) {
                this.deck = data.deck;
                this.playerHand = data.playerHand;
                this.opponentHand = data.opponentHand;
                this.trump = data.trump;
                this.turn = data.turn;
                this.isAttacker = data.isAttacker;
                this.table = data.table;
                this.render();
            },

            render() {
                this.renderHand('player-hand', this.playerHand, true);
                this.renderHand('opponent-hand', this.opponentHand, false);
                this.renderTable();
                this.renderDeck();
                this.updateControls();
            },

            renderHand(id, hand, isPlayer) {
                const container = document.getElementById(id);
                container.innerHTML = '';
                
                if (isPlayer) {
                    hand.sort((a, b) => (a.s === this.trump.s ? a.val + 20 : a.val) - (b.s === this.trump.s ? b.val + 20 : b.val));
                }

                hand.forEach((card, i) => {
                    const el = this.createCardEl(card, !isPlayer);
                    const offset = (i - (hand.length - 1) / 2) * (isPlayer ? 45 : 25);
                    const rotation = isPlayer ? (i - (hand.length - 1) / 2) * 5 : 0;
                    
                    el.style.left = `calc(50% + ${offset}px - (var(--card-w)/2))`;
                    if (isPlayer) {
                        el.style.bottom = '0px';
                        el.style.transform = `rotate(${rotation}deg)`;
                        if (this.canPlay(card)) {
                            el.classList.add('playable');
                            el.onclick = () => this.playCard(i);
                        }
                    } else {
                        el.style.top = '0px';
                    }
                    container.appendChild(el);
                });
            },

            renderTable() {
                const grid = document.getElementById('battle-grid');
                grid.innerHTML = '';
                this.table.forEach(pair => {
                    const wrap = document.createElement('div');
                    wrap.className = 'relative w-[var(--card-w)] h-[var(--card-h)]';
                    
                    const atk = this.createCardEl(pair.atk, false);
                    wrap.appendChild(atk);

                    if (pair.def) {
                        const def = this.createCardEl(pair.def, false);
                        def.style.transform = 'translate(18px, 18px) rotate(12deg)';
                        wrap.appendChild(def);
                    }
                    grid.appendChild(wrap);
                });
            },

            renderDeck() {
                const tSlot = document.getElementById('trump-slot');
                const dStack = document.getElementById('deck-stack');
                const count = document.getElementById('deck-count');
                
                tSlot.innerHTML = ''; dStack.innerHTML = '';
                
                if (this.deck.length > 0) {
                    const tc = this.createCardEl(this.trump, false);
                    tc.style.transform = 'rotate(90deg) translate(0, 38px)';
                    tSlot.appendChild(tc);
                    
                    if (this.deck.length > 1) {
                        const back = this.createCardEl(null, true);
                        dStack.appendChild(back);
                    }
                }
                count.textContent = this.deck.length;
            },

            createCardEl(card, hidden) {
                const div = document.createElement('div');
                div.className = `card-node ${hidden ? 'is-flipped' : ''}`;
                const red = card?.red ? 'card-red' : '';
                div.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face ${red}">
                            <div class="flex flex-col leading-none">
                                <span class="text-sm">${card?.rank || ''}</span>
                                <span class="text-xs">${card?.s || ''}</span>
                            </div>
                            <div class="text-4xl opacity-10 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">${card?.s || ''}</div>
                            <div class="flex flex-col leading-none self-end rotate-180">
                                <span class="text-sm">${card?.rank || ''}</span>
                                <span class="text-xs">${card?.s || ''}</span>
                            </div>
                        </div>
                        <div class="card-back"></div>
                    </div>
                `;
                return div;
            },

            canPlay(card) {
                if (this.turn !== 'me') return false;
                if (this.isAttacker) {
                    if (this.table.length === 0) return true;
                    if (this.table.length >= 6) return false;
                    const ranksOnTable = this.table.flatMap(p => [p.atk.rank, p.def?.rank]).filter(Boolean);
                    return ranksOnTable.includes(card.rank);
                } else {
                    const lastPair = this.table[this.table.length - 1];
                    if (!lastPair || lastPair.def) return false;
                    const atk = lastPair.atk;
                    return (card.s === atk.s && card.val > atk.val) || (card.s === this.trump.s && atk.s !== this.trump.s);
                }
            },

            playCard(idx) {
                const card = this.playerHand.splice(idx, 1)[0];
                NexusDurak.haptic('light');
                
                if (this.isAttacker) {
                    this.table.push({ atk: card, def: null });
                } else {
                    this.table[this.table.length - 1].def = card;
                }

                this.turn = 'peer';
                this.render();
                Network.send('MOVE', { card, table: this.table });
            },

            onRemoteMove(data) {
                NexusDurak.haptic('medium');
                this.opponentHand.pop();
                this.table = data.table;
                this.turn = 'me';
                this.render();
            },

            handleAction() {
                NexusDurak.haptic('medium');
                const action = this.isAttacker ? 'BITO' : 'TAKE';
                Network.send('ACTION', { action });
                this.processAction(action, 'me');
            },

            onRemoteAction(data) {
                this.processAction(data.action, 'peer');
            },

            processAction(action, who) {
                if (action === 'BITO') {
                    this.table = [];
                    this.replenish();
                    this.isAttacker = (who !== 'me');
                    this.turn = this.isAttacker ? 'me' : 'peer';
                } else {
                    const cards = this.table.flatMap(p => [p.atk, p.def]).filter(Boolean);
                    if (who === 'me') this.playerHand.push(...cards);
                    else this.opponentHand.push(...cards);
                    this.table = [];
                    this.replenish();
                    this.isAttacker = (who === 'me'); 
                    this.turn = this.isAttacker ? 'me' : 'peer';
                }
                this.render();
            },

            replenish() {
                while (this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while (this.opponentHand.length < 6 && this.deck.length > 0) this.opponentHand.push(this.deck.pop());
                this.checkEnd();
            },

            updateControls() {
                const bar = document.getElementById('action-bar');
                const btn = document.getElementById('btn-action');
                
                if (this.turn === 'me' && this.gameState === 'playing') {
                    bar.classList.remove('opacity-0', 'translate-y-12');
                    btn.textContent = this.isAttacker ? 'БИТО' : 'ВЗЯТЬ';
                    btn.disabled = this.isAttacker && this.table.length === 0;
                    btn.classList.toggle('active-turn-glow', !btn.disabled);
                } else {
                    bar.classList.add('opacity-0', 'translate-y-12');
                }
            },

            checkEnd() {
                if (this.deck.length === 0) {
                    if (this.playerHand.length === 0 && this.opponentHand.length === 0) this.endGame('draw');
                    else if (this.playerHand.length === 0) this.endGame('win');
                    else if (this.opponentHand.length === 0) this.endGame('lose');
                }
            },

            endGame(res) {
                this.gameState = 'over';
                const overlay = document.getElementById('overlay-result');
                const title = document.getElementById('res-title');
                const desc = document.getElementById('res-desc');
                const icon = document.getElementById('res-icon');

                overlay.style.display = 'flex';
                if (res === 'win') {
                    NexusDurak.haptic('success');
                    const winAmount = this.bet * 1.9; // 10% commission
                    NexusDurak.vault.balance += winAmount;
                    NexusDurak.vault.wins++;
                    title.textContent = 'VICTORY';
                    title.className = 'text-8xl font-black italic text-metro-accent tracking-tighter';
                    desc.textContent = `You earned ${winAmount.toLocaleString()} ₽`;
                    icon.textContent = '🏆';
                } else if (res === 'lose') {
                    NexusDurak.haptic('error');
                    title.textContent = 'DEFEAT';
                    title.className = 'text-8xl font-black italic text-metro-rose tracking-tighter';
                    desc.textContent = `You lost ${this.bet.toLocaleString()} ₽`;
                    icon.textContent = '💀';
                } else {
                    NexusDurak.vault.balance += this.bet;
                    title.textContent = 'DRAW';
                    desc.textContent = 'Stake returned to vault';
                    icon.textContent = '🤝';
                }
                NexusDurak.vault.turnover += this.bet;
                NexusDurak.syncUI();
            }
        };

        window.onload = () => NexusDurak.init();
    </script>
</body>
</html>
