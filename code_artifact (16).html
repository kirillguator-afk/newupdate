<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дурак - METRO CASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { metro: { dark: '#0a0a0a', table: '#1e3a8a', accent: '#d97706' } } } } }
    </script>
    <style>
        body { background-color: #0a0a0a; color: white; user-select: none; overflow: hidden; font-family: sans-serif; }
        
        .card { 
            width: 60px; height: 90px; background: white; border-radius: 6px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.4); display: flex; flex-direction: column; 
            justify-content: space-between; padding: 4px; color: black; font-weight: bold; 
            position: absolute; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer; transform-origin: bottom center; border: 1px solid #ccc;
        }
        .card:hover { transform: translateY(-15px) !important; box-shadow: 0 -5px 15px rgba(217,119,6,0.5); z-index: 50 !important; }
        .card-red { color: #DC2626; }
        .card-back { background: repeating-linear-gradient(45deg, #7f1d1d, #7f1d1d 5px, #991b1b 5px, #991b1b 10px); border: 2px solid white; cursor: default; }
        .suit-center { font-size: 2rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.15; }
        
        .table-card { pointer-events: none; }
        .table-card:hover { transform: none !important; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        
        #playerHand, #aiHand { position: absolute; left: 50%; width: 100%; display: flex; justify-content: center; }
        #playerHand { bottom: 20px; height: 100px; transform: translateX(-50%); }
        #aiHand { top: 80px; height: 100px; transform: translateX(-50%) rotate(180deg); }
        
        .deck-area { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 80px; height: 100px; }
        
        /* Фишки */
        .chip { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: black; border: 3px dashed rgba(255,255,255,0.3); cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.6); transition: all 0.1s; }
        .chip:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0.6); }

        .modal-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="h-screen w-full flex flex-col relative">

    <header class="p-3 flex justify-between items-center bg-black/60 z-30 absolute top-0 w-full backdrop-blur-md">
        <button onclick="Game.exit()" class="text-gray-300 hover:text-white flex items-center gap-2 bg-white/10 px-3 py-1.5 rounded-full text-sm font-bold">
            <i class="fa-solid fa-chevron-left"></i> Выход
        </button>
        <div class="flex items-center gap-3">
            <div id="gameStatus" class="text-xs font-bold bg-blue-600/50 text-blue-200 px-3 py-1 rounded-full border border-blue-400">Ожидание ставки</div>
            <div class="font-bold text-metro-accent bg-black/50 px-3 py-1 rounded-full border border-metro-accent/30" id="gameBalance">0 ₽</div>
        </div>
    </header>

    <main class="flex-1 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-800 via-metro-table to-black relative shadow-[inset_0_0_100px_rgba(0,0,0,0.9)] overflow-hidden">
        
        <!-- Игровой стол -->
        <div id="gameBoard" class="hidden w-full h-full relative">
            <div id="aiHand"></div>
            
            <div class="deck-area">
                <div id="trumpCard" class="absolute top-0 left-0" style="transform: rotate(90deg) translate(20px, -20px);"></div>
                <div id="deckStack" class="absolute top-0 left-0"></div>
                <div id="cardsLeft" class="absolute -bottom-8 left-1/2 transform -translate-x-1/2 text-white font-bold bg-black/50 px-2 py-1 rounded text-xs border border-white/20">36</div>
            </div>

            <!-- Зона битвы -->
            <div id="battleZone" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[80%] h-[200px] flex flex-wrap justify-center items-center gap-4">
                <!-- Карты на столе генерируются JS -->
            </div>

            <!-- Кнопка действия -->
            <button id="actionBtn" onclick="Game.playerAction()" class="absolute bottom-[130px] left-1/2 transform -translate-x-1/2 bg-metro-accent text-black font-black px-6 py-2 rounded-xl shadow-lg border border-yellow-300 transition active:scale-95 z-20 hidden">
                БИТО / ВЗЯТЬ
            </button>

            <div id="playerHand"></div>
        </div>

        <!-- Экран ставок -->
        <div id="betScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 z-20 backdrop-blur-sm">
            <div class="bg-metro-dark p-6 rounded-3xl border border-white/10 shadow-2xl text-center w-80 modal-enter">
                <i class="fa-solid fa-cards text-5xl text-metro-accent mb-4"></i>
                <h2 class="text-xl font-black mb-1">Дурак Подкидной</h2>
                <p class="text-xs text-gray-400 mb-6">Игра против умного бота (Сложность: Высокая)</p>
                
                <div class="text-3xl font-black text-white mb-6 border-b border-white/10 pb-4">
                    Ставка: <span id="currentBet" class="text-metro-accent">0</span> ₽
                </div>
                
                <div class="flex justify-center gap-3 mb-6">
                    <div onclick="Game.addBet(100)" class="chip bg-blue-600 border-blue-400">100</div>
                    <div onclick="Game.addBet(500)" class="chip bg-purple-600 border-purple-400">500</div>
                    <div onclick="Game.addBet(1000)" class="chip bg-yellow-500 text-black border-yellow-200">1K</div>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="Game.clearBet()" class="flex-1 bg-gray-700 py-3 rounded-xl font-bold text-sm">Сброс</button>
                    <button onclick="Game.startGame()" class="flex-[2] bg-metro-accent text-black font-black py-3 rounded-xl shadow-[0_0_15px_rgba(217,119,6,0.5)]">ИГРАТЬ</button>
                </div>
            </div>
        </div>

        <!-- Экран финала -->
        <div id="resultScreen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-40 backdrop-blur-md">
            <div class="text-center modal-enter">
                <div id="resultIcon" class="text-7xl mb-4 text-yellow-400"><i class="fa-solid fa-trophy"></i></div>
                <h1 id="resultTitle" class="text-5xl font-black text-white mb-2 tracking-widest drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">ПОБЕДА</h1>
                <p id="resultText" class="text-lg text-gray-400 mb-8">+1000 ₽</p>
                <button onclick="Game.showBetScreen()" class="bg-metro-accent text-black font-black px-10 py-4 rounded-2xl text-xl shadow-[0_0_20px_rgba(217,119,6,0.6)] active:scale-95 transition">
                    СЫГРАТЬ ЕЩЕ
                </button>
            </div>
        </div>

    </main>

    <script>
        const suits = ['♠', '♥', '♦', '♣'];
        const ranks = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        const rVals = {'6':6,'7':7,'8':8,'9':9,'10':10,'J':11,'Q':12,'K':13,'A':14};
        
        let db = JSON.parse(localStorage.getItem('metro_db')) || { balance: 5000, turnover: 0, gamesPlayed: 0 };

        const Game = {
            deck: [], playerHand: [], aiHand: [], table: [], trump: null,
            bet: 0, state: 'betting', turn: 'player', // player, ai
            
            init() { document.getElementById('gameBalance').textContent = db.balance.toLocaleString() + ' ₽'; },
            exit() { localStorage.setItem('metro_db', JSON.stringify(db)); window.location.href = 'metro_cash_app.html'; },

            addBet(a) { if(db.balance >= a) { this.bet += a; db.balance -= a; document.getElementById('currentBet').textContent = this.bet; this.init(); } },
            clearBet() { db.balance += this.bet; this.bet = 0; document.getElementById('currentBet').textContent = 0; this.init(); },
            showBetScreen() {
                this.bet = 0; document.getElementById('currentBet').textContent = 0;
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('gameBoard').classList.add('hidden');
                document.getElementById('betScreen').classList.remove('hidden');
                this.init();
            },

            startGame() {
                if(this.bet === 0) return;
                db.turnover += this.bet;
                
                document.getElementById('betScreen').classList.add('hidden');
                document.getElementById('gameBoard').classList.remove('hidden');
                
                this.buildDeck();
                this.playerHand = []; this.aiHand = []; this.table = [];
                
                // Раздача
                for(let i=0; i<6; i++) { this.playerHand.push(this.deck.pop()); this.aiHand.push(this.deck.pop()); }
                this.trump = this.deck[0]; // Козырь внизу
                
                // Кто первый (упрощенно: всегда игрок для удобства или случайность)
                this.turn = Math.random() > 0.5 ? 'player' : 'ai';
                
                this.state = 'playing';
                this.updateUI();
                if(this.turn === 'ai') setTimeout(() => this.aiAttack(), 1000);
            },

            buildDeck() {
                this.deck = [];
                for(let s of suits) for(let r of ranks) this.deck.push({suit: s, rank: r, isRed: s==='♥' || s==='♦', val: rVals[r]});
                // Перемешивание
                for (let i = this.deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
                }
            },

            // --- Визуализация ---
            renderCard(c, isHidden = false, onClick = null, extraClass = '') {
                if(!c) return '';
                if(isHidden) return `<div class="card card-back ${extraClass}"></div>`;
                const col = c.isRed ? 'card-red' : '';
                const clickAttr = onClick ? `onclick="${onClick}"` : '';
                return `
                    <div class="card ${col} ${extraClass}" ${clickAttr} data-suit="${c.suit}" data-rank="${c.rank}">
                        <div class="text-sm">${c.rank}</div>
                        <div class="suit-center">${c.suit}</div>
                        <div class="text-sm self-end transform rotate-180">${c.rank}</div>
                    </div>`;
            },

            updateUI() {
                // Рука игрока
                const pDiv = document.getElementById('playerHand');
                pDiv.innerHTML = '';
                const pLen = this.playerHand.length;
                this.playerHand.sort((a,b) => (a.suit===this.trump.suit ? a.val+100 : a.val) - (b.suit===this.trump.suit ? b.val+100 : b.val));
                
                this.playerHand.forEach((c, i) => {
                    // Расположение веером
                    const offset = (i - (pLen-1)/2) * 30;
                    const rot = (i - (pLen-1)/2) * 5;
                    const html = this.renderCard(c, false, `Game.playCard(${i})`, '');
                    const el = document.createElement('div');
                    el.innerHTML = html;
                    const cardEl = el.firstElementChild;
                    cardEl.style.left = `calc(50% + ${offset}px)`;
                    cardEl.style.transform = `rotate(${rot}deg)`;
                    pDiv.appendChild(cardEl);
                });

                // Рука AI (закрытые)
                const aDiv = document.getElementById('aiHand');
                aDiv.innerHTML = this.aiHand.map((c,i) => this.renderCard(c, true, null, 'relative -ml-8')).join('');

                // Колода и козырь
                document.getElementById('trumpCard').innerHTML = this.deck.length > 0 ? this.renderCard(this.trump) : '';
                document.getElementById('deckStack').innerHTML = this.deck.length > 1 ? this.renderCard(null, true) : '';
                document.getElementById('cardsLeft').textContent = this.deck.length;

                // Стол (пары: атака - защита)
                const tDiv = document.getElementById('battleZone');
                tDiv.innerHTML = '';
                this.table.forEach(pair => {
                    const wrap = document.createElement('div');
                    wrap.className = 'relative w-[60px] h-[90px]';
                    wrap.innerHTML = this.renderCard(pair.atk, false, null, 'table-card absolute top-0 left-0');
                    if(pair.def) {
                        wrap.innerHTML += this.renderCard(pair.def, false, null, 'table-card absolute top-4 left-4 z-10');
                    }
                    tDiv.appendChild(wrap);
                });

                // Статус и кнопки
                const status = document.getElementById('gameStatus');
                const btn = document.getElementById('actionBtn');
                
                if(this.state === 'gameover') {
                    btn.classList.add('hidden');
                } else if(this.turn === 'player') {
                    if(this.table.length > 0 && !this.table[this.table.length-1].def) {
                        // Игрок защищается
                        status.textContent = "Ваш ход (Защита)"; status.className = "text-xs font-bold bg-red-600/50 text-red-200 px-3 py-1 rounded-full border border-red-400";
                        btn.textContent = "ВЗЯТЬ КАРТЫ"; btn.classList.remove('hidden'); btn.className = "absolute bottom-[140px] left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-black px-8 py-3 rounded-xl shadow-lg border border-red-400 transition active:scale-95 z-20";
                    } else {
                        // Игрок атакует/подкидывает
                        status.textContent = "Ваш ход (Атака)"; status.className = "text-xs font-bold bg-green-600/50 text-green-200 px-3 py-1 rounded-full border border-green-400";
                        if(this.table.length > 0) {
                            btn.textContent = "БИТО (Завершить)"; btn.classList.remove('hidden'); btn.className = "absolute bottom-[140px] left-1/2 transform -translate-x-1/2 bg-green-600 text-white font-black px-8 py-3 rounded-xl shadow-lg border border-green-400 transition active:scale-95 z-20";
                        } else {
                            btn.classList.add('hidden');
                        }
                    }
                } else {
                    status.textContent = "Ход Бота..."; status.className = "text-xs font-bold bg-gray-600/50 text-gray-200 px-3 py-1 rounded-full border border-gray-400";
                    btn.classList.add('hidden');
                }
            },

            canPlay(card) {
                if(this.table.length === 0) return true; // Первая карта любая
                
                // Если мы защищаемся
                if(this.turn === 'player' && this.table.length > 0 && !this.table[this.table.length-1].def) {
                    const atkCard = this.table[this.table.length-1].atk;
                    // Бьем в масть бОльшей
                    if(card.suit === atkCard.suit && card.val > atkCard.val) return true;
                    // Бьем козырем (если атака не козырь, или наш козырь старше)
                    if(card.suit === this.trump.suit && (atkCard.suit !== this.trump.suit || card.val > atkCard.val)) return true;
                    return false;
                }

                // Если мы подкидываем
                if(this.turn === 'player' && this.table.length > 0 && this.table[this.table.length-1].def) {
                    // Можно подкинуть только если ранг есть на столе
                    const ranksOnTable = new Set();
                    this.table.forEach(p => { ranksOnTable.add(p.atk.rank); if(p.def) ranksOnTable.add(p.def.rank); });
                    return ranksOnTable.has(card.rank);
                }
                return false;
            },

            playCard(idx) {
                if(this.turn !== 'player' || this.state !== 'playing') return;
                const card = this.playerHand[idx];
                
                if(this.canPlay(card)) {
                    this.playerHand.splice(idx, 1);
                    
                    if(this.table.length > 0 && !this.table[this.table.length-1].def) {
                        // Защитились
                        this.table[this.table.length-1].def = card;
                        this.turn = 'ai'; // Очередь AI подкидывать или говорить бито
                        this.updateUI();
                        setTimeout(() => this.aiAction(), 800);
                    } else {
                        // Атаковали / Подкинули
                        this.table.push({ atk: card, def: null });
                        this.turn = 'ai'; // AI защищается
                        this.updateUI();
                        setTimeout(() => this.aiDefend(), 800);
                    }
                }
            },

            playerAction() {
                if(this.turn !== 'player') return;
                
                if(this.table.length > 0 && !this.table[this.table.length-1].def) {
                    // Берем карты
                    this.table.forEach(p => { this.playerHand.push(p.atk); if(p.def) this.playerHand.push(p.def); });
                    this.table = [];
                    this.replenish();
                    this.turn = 'ai';
                    this.updateUI();
                    setTimeout(() => this.aiAttack(), 1000);
                } else {
                    // Бито
                    this.table = [];
                    this.replenish();
                    this.turn = 'ai';
                    this.updateUI();
                    setTimeout(() => this.aiAttack(), 1000);
                }
            },

            aiAttack() {
                if(this.state !== 'playing') return;
                if(this.aiHand.length === 0) { this.checkWin(); return; }
                
                // Выбираем самую слабую не козырную карту для атаки
                let best = -1; let minVal = 999;
                this.aiHand.forEach((c, i) => {
                    let v = c.suit === this.trump.suit ? c.val + 100 : c.val;
                    if(v < minVal) { minVal = v; best = i; }
                });
                
                if(best !== -1) {
                    const card = this.aiHand.splice(best, 1)[0];
                    this.table.push({atk: card, def: null});
                    this.turn = 'player';
                    this.updateUI();
                }
            },

            aiDefend() {
                if(this.state !== 'playing') return;
                const atk = this.table[this.table.length-1].atk;
                let best = -1; let minVal = 999;
                
                // Ищем минимальную карту чтобы побить
                this.aiHand.forEach((c, i) => {
                    let isValid = false;
                    if(c.suit === atk.suit && c.val > atk.val) isValid = true;
                    if(c.suit === this.trump.suit && (atk.suit !== this.trump.suit || c.val > atk.val)) isValid = true;
                    
                    if(isValid) {
                        let v = c.suit === this.trump.suit ? c.val + 100 : c.val;
                        if(v < minVal) { minVal = v; best = i; }
                    }
                });

                if(best !== -1) {
                    // Бот бьет
                    this.table[this.table.length-1].def = this.aiHand.splice(best, 1)[0];
                    this.turn = 'player';
                    this.updateUI();
                } else {
                    // Бот берет
                    setTimeout(() => {
                        this.table.forEach(p => { this.aiHand.push(p.atk); if(p.def) this.aiHand.push(p.def); });
                        this.table = [];
                        this.replenish();
                        this.turn = 'player';
                        this.updateUI();
                    }, 1000);
                }
            },

            aiAction() {
                // Решение подкидывать или бито
                if(this.aiHand.length === 0 || this.playerHand.length === 0) { this.table = []; this.replenish(); this.turn='player'; this.updateUI(); return; }
                
                const ranksOnTable = new Set();
                this.table.forEach(p => { ranksOnTable.add(p.atk.rank); if(p.def) ranksOnTable.add(p.def.rank); });
                
                let toThrow = -1;
                this.aiHand.forEach((c, i) => { if(ranksOnTable.has(c.rank) && c.suit !== this.trump.suit) toThrow = i; }); // Бот подкидывает только не козыри для простоты
                
                if(toThrow !== -1 && this.table.length < 6) {
                    const card = this.aiHand.splice(toThrow, 1)[0];
                    this.table.push({atk: card, def: null});
                    this.turn = 'player';
                    this.updateUI();
                } else {
                    // Бито
                    setTimeout(() => {
                        this.table = [];
                        this.replenish();
                        this.turn = 'player';
                        this.updateUI();
                    }, 800);
                }
            },

            replenish() {
                // Добор карт. Сначала берет атакующий (прошлая turn)
                // Для упрощения логики в одном файле: добирает игрок, потом бот до 6
                while(this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while(this.aiHand.length < 6 && this.deck.length > 0) this.aiHand.push(this.deck.pop());
                this.checkWin();
            },

            checkWin() {
                if(this.deck.length === 0) {
                    if(this.playerHand.length === 0 && this.aiHand.length > 0) this.endGame('win');
                    else if(this.aiHand.length === 0 && this.playerHand.length > 0) this.endGame('lose');
                    else if(this.aiHand.length === 0 && this.playerHand.length === 0) this.endGame('draw');
                }
            },

            endGame(res) {
                this.state = 'gameover';
                this.updateUI();
                
                db.gamesPlayed++;
                const screen = document.getElementById('resultScreen');
                const title = document.getElementById('resultTitle');
                const text = document.getElementById('resultText');
                const icon = document.getElementById('resultIcon');
                
                screen.classList.remove('hidden');
                
                if(res === 'win') {
                    db.balance += this.bet * 2;
                    title.textContent = "ВЫ ВЫИГРАЛИ"; title.className = "text-5xl font-black text-green-400 mb-2 drop-shadow-[0_0_15px_rgba(74,222,128,0.8)]";
                    text.textContent = `+${this.bet * 2} ₽`;
                    icon.innerHTML = '<i class="fa-solid fa-trophy"></i>'; icon.className = "text-7xl mb-4 text-yellow-400";
                } else if(res === 'lose') {
                    title.textContent = "ВЫ ПРОИГРАЛИ"; title.className = "text-5xl font-black text-red-500 mb-2 drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]";
                    text.textContent = `-${this.bet} ₽`;
                    icon.innerHTML = '<i class="fa-solid fa-skull"></i>'; icon.className = "text-7xl mb-4 text-red-500";
                } else {
                    db.balance += this.bet;
                    title.textContent = "НИЧЬЯ"; title.className = "text-5xl font-black text-gray-300 mb-2";
                    text.textContent = "Возврат ставки";
                    icon.innerHTML = '<i class="fa-solid fa-handshake"></i>'; icon.className = "text-7xl mb-4 text-gray-400";
                }
                
                localStorage.setItem('metro_db', JSON.stringify(db));
            }
        };

        window.onload = () => Game.init();
    </script>
</body>
</html>
