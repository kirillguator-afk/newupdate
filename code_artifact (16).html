<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>METRO DURAK ELITE | P2P Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        metro: { 
                            black: '#050505', 
                            dark: '#0f0f0f', 
                            accent: '#fbbf24',
                            gold: '#d97706',
                            emerald: '#064e3b',
                            card: 'var(--tg-theme-secondary-bg-color, #1c1c1e)'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --card-w: 72px;
            --card-h: 104px;
            --tg-accent: var(--tg-theme-button-color, #fbbf24);
        }

        @media (min-width: 640px) {
            :root { --card-w: 85px; --card-h: 124px; }
        }

        body {
            background-color: #050505;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
        }

        .casino-felt {
            background: 
                radial-gradient(circle at 50% 50%, rgba(6, 78, 59, 0.3) 0%, transparent 80%),
                radial-gradient(circle at 0% 0%, rgba(251, 191, 36, 0.02) 0%, transparent 40%),
                #050505;
            position: relative;
        }

        .casino-felt::before {
            content: ""; position: absolute; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            opacity: 0.03; pointer-events: none;
        }

        /* Card Component Architecture */
        .card-wrapper {
            width: var(--card-w);
            height: var(--card-h);
            perspective: 1200px;
            position: absolute;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 12px;
            background: #ffffff;
            color: #1a1a1a;
            padding: 8px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(0,0,0,0.08);
            font-weight: 900;
        }

        .card-back {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            transform: rotateY(180deg);
            border: 3px solid #ffffff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card-back::before {
            content: ""; position: absolute; inset: 4px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
        }

        .card-back::after {
            content: "M"; font-size: 2.2rem; color: rgba(255,255,255,0.03);
            font-weight: 900; font-style: italic;
        }

        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-red { color: #e11d48; }
        .suit-center { 
            font-size: 2.5rem; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); opacity: 0.07; pointer-events: none;
        }

        .playable:hover { transform: translateY(-25px) scale(1.08) !important; z-index: 100 !important; cursor: pointer; }
        .playable:active { transform: translateY(-15px) scale(0.95) !important; }

        /* UI Elements */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        
        .chip {
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 4px dashed rgba(255,255,255,0.2); cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.4), 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.2s; font-size: 0.8rem;
        }
        .chip:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }

        .action-btn {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #050505; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.05em; font-style: italic;
            box-shadow: 0 10px 30px rgba(217, 119, 6, 0.3);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .action-btn:active { transform: scale(0.96); }
        .action-btn:disabled { opacity: 0.3; filter: grayscale(1); pointer-events: none; }

        #battleZone {
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 260px; display: flex; justify-content: center; align-items: center; gap: 20px;
            z-index: 5;
        }

        .thinking-dots::after { content: ''; animation: dots 1.5s infinite; }
        @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }

        .trump-indicator {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
    </style>
</head>
<body class="flex flex-col casino-felt">

    <!-- Header HUD -->
    <header class="fixed top-0 w-full z-50 px-5 py-4 flex justify-between items-center bg-black/30 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <button onclick="App.exit()" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center border border-white/10 active:scale-90 transition">
                <i class="fa-solid fa-chevron-left text-metro-accent"></i>
            </button>
            <div>
                <div class="text-[10px] text-gray-400 font-black uppercase tracking-widest leading-none mb-1">Elite Durak</div>
                <div id="gameStatus" class="text-xs font-bold text-white flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-metro-accent animate-pulse"></span>
                    ОЖИДАНИЕ
                </div>
            </div>
        </div>
        <div class="text-right">
            <span class="text-[10px] text-gray-400 font-black uppercase tracking-widest block">Баланс</span>
            <div class="font-black text-white text-lg" id="userBalance">0 ₽</div>
        </div>
    </header>

    <!-- Game Table -->
    <main class="flex-1 relative">
        <!-- Deck & Trump -->
        <div class="trump-indicator z-10">
            <div id="deckContainer" class="relative w-[var(--card-w)] h-[var(--card-h)]">
                <div id="trumpCardSlot" class="absolute inset-0"></div>
                <div id="deckStackSlot" class="absolute inset-0 -translate-x-2 -translate-y-1"></div>
            </div>
            <div id="deckCount" class="bg-black/80 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] font-black border border-white/10 shadow-2xl">36</div>
        </div>

        <!-- Battle Area -->
        <div id="battleZone"></div>

        <!-- AI Hand (Top) -->
        <div id="aiHand" class="absolute top-24 left-0 right-0 h-[var(--card-h)] flex justify-center pointer-events-none"></div>

        <!-- Player Hand (Bottom) -->
        <div id="playerHand" class="absolute bottom-32 left-0 right-0 h-[var(--card-h)] flex justify-center"></div>

        <!-- Action Controls -->
        <div id="controls" class="absolute bottom-8 left-0 right-0 px-6 flex justify-center gap-4 z-40 opacity-0 pointer-events-none transition-all duration-500 translate-y-10">
            <button id="mainActionBtn" onclick="Game.handleAction()" class="action-btn w-full max-w-xs py-5 rounded-2xl text-lg shadow-2xl">
                БИТО
            </button>
        </div>
    </main>

    <!-- Betting Overlay -->
    <div id="betOverlay" class="fixed inset-0 z-[100] glass flex items-center justify-center p-6 transition-all duration-500">
        <div class="w-full max-w-sm text-center space-y-8">
            <div class="animate-bounce">
                <div class="w-20 h-20 bg-metro-accent/10 rounded-3xl mx-auto flex items-center justify-center mb-4 border border-metro-accent/20 shadow-glow">
                    <i class="fa-solid fa-crown text-4xl text-metro-accent"></i>
                </div>
                <h2 class="text-4xl font-black italic tracking-tighter uppercase">Metro <span class="text-metro-accent">Durak</span></h2>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-[0.3em] mt-2">Elite P2P Table</p>
            </div>

            <div class="bg-black/60 backdrop-blur-2xl rounded-[2.5rem] p-8 border border-white/10 shadow-2xl">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-2">Ваша Ставка</span>
                <div class="text-5xl font-black text-white mb-8" id="displayBet">0 <span class="text-metro-accent text-3xl">₽</span></div>
                
                <div class="flex justify-around items-center mb-8">
                    <div onclick="Game.addBet(100)" class="chip bg-gradient-to-br from-blue-600 to-blue-800">100</div>
                    <div onclick="Game.addBet(500)" class="chip bg-gradient-to-br from-purple-600 to-purple-800">500</div>
                    <div onclick="Game.addBet(1000)" class="chip bg-gradient-to-br from-amber-500 to-amber-700 text-black">1K</div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="Game.clearBet()" class="py-4 rounded-2xl bg-white/5 border border-white/10 font-black text-xs text-gray-400 uppercase tracking-widest active:bg-white/10 transition">Сброс</button>
                    <button onclick="Game.start()" class="action-btn py-4 rounded-2xl font-black text-sm">В ИГРУ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Result Overlay -->
    <div id="resultOverlay" class="fixed inset-0 z-[110] hidden glass flex items-center justify-center p-6">
        <div class="text-center animate-in fade-in zoom-in duration-300">
            <div id="resultIcon" class="text-9xl mb-6 drop-shadow-[0_0_30px_rgba(251,191,36,0.5)]">🏆</div>
            <h2 id="resultTitle" class="text-7xl font-black italic tracking-tighter mb-2">WINNER</h2>
            <p id="resultText" class="text-gray-400 font-bold mb-12 uppercase tracking-[0.2em]">Вы выиграли 2,000 ₽</p>
            <button onclick="location.reload()" class="action-btn px-16 py-6 rounded-2xl text-xl shadow-glow-strong">ИГРАТЬ СНОВА</button>
        </div>
    </div>

    <script>
        /**
         * NEXUS ARCHITECT - DURAK ELITE ENGINE
         * Optimized for TWA & P2P Logic
         */

        const TG = window.Telegram?.WebApp;
        const SUITS = [
            { s: '♠', name: 'spades', isRed: false },
            { s: '♣', name: 'clubs', isRed: false },
            { s: '♥', name: 'hearts', isRed: true },
            { s: '♦', name: 'diamonds', isRed: true }
        ];
        const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        const RANK_VALUES = { '6': 6, '7': 7, '8': 8, '9': 9, '10': 10, 'J': 11, 'Q': 12, 'K': 13, 'A': 14 };

        const App = {
            db: JSON.parse(localStorage.getItem('metro_vault')) || { balance: 5000, turnover: 0 },
            exit() {
                localStorage.setItem('metro_vault', JSON.stringify(this.db));
                window.location.href = 'metro_cash_app.html';
            },
            haptic(style = 'light') {
                if (!TG) return;
                if (['success', 'warning', 'error'].includes(style)) TG.HapticFeedback.notificationOccurred(style);
                else TG.HapticFeedback.impactOccurred(style);
            }
        };

        const Game = {
            deck: [],
            playerHand: [],
            aiHand: [],
            table: [], 
            trump: null,
            bet: 0,
            turn: 'player', 
            state: 'betting', 
            isAttacking: true,

            init() {
                if (TG) {
                    TG.ready();
                    TG.expand();
                }
                this.updateUI();
            },

            addBet(amount) {
                if (App.db.balance >= amount) {
                    App.haptic('light');
                    this.bet += amount;
                    App.db.balance -= amount;
                    this.updateUI();
                }
            },

            clearBet() {
                App.haptic('medium');
                App.db.balance += this.bet;
                this.bet = 0;
                this.updateUI();
            },

            start() {
                if (this.bet <= 0) return;
                App.haptic('heavy');
                this.state = 'playing';
                const overlay = document.getElementById('betOverlay');
                overlay.style.opacity = '0';
                overlay.style.transform = 'scale(1.1)';
                setTimeout(() => overlay.style.display = 'none', 500);
                
                this.buildDeck();
                this.dealInitial();
                this.determineFirstTurn();
                this.updateUI();
            },

            buildDeck() {
                this.deck = [];
                SUITS.forEach(suit => {
                    RANKS.forEach(rank => {
                        this.deck.push({ ...suit, rank, val: RANK_VALUES[rank] });
                    });
                });
                for (let i = this.deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
                }
                this.trump = this.deck[0];
            },

            dealInitial() {
                for (let i = 0; i < 6; i++) {
                    this.playerHand.push(this.deck.pop());
                    this.aiHand.push(this.deck.pop());
                }
            },

            determineFirstTurn() {
                const pMinTrump = Math.min(...this.playerHand.filter(c => c.s === this.trump.s).map(c => c.val), 100);
                const aMinTrump = Math.min(...this.aiHand.filter(c => c.s === this.trump.s).map(c => c.val), 100);
                
                this.turn = pMinTrump <= aMinTrump ? 'player' : 'ai';
                this.isAttacking = (this.turn === 'player');
                
                if (this.turn === 'ai') {
                    setTimeout(() => this.aiMove(), 1500);
                }
            },

            updateUI() {
                document.getElementById('userBalance').textContent = App.db.balance.toLocaleString() + ' ₽';
                document.getElementById('displayBet').textContent = this.bet.toLocaleString();
                
                const statusEl = document.getElementById('gameStatus');
                if (this.state === 'playing') {
                    statusEl.innerHTML = this.turn === 'player' 
                        ? `<span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> ВАШ ХОД`
                        : `<span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span> БОТ ДУМАЕТ<span class="thinking-dots"></span>`;
                }

                this.renderHands();
                this.renderTable();
                this.renderDeck();
                this.updateControls();
            },

            renderHands() {
                const pHand = document.getElementById('playerHand');
                const aHand = document.getElementById('aiHand');
                pHand.innerHTML = '';
                aHand.innerHTML = '';

                this.playerHand.sort((a, b) => {
                    const valA = a.s === this.trump.s ? a.val + 20 : a.val;
                    const valB = b.s === this.trump.s ? b.val + 20 : b.val;
                    return valA - valB;
                });

                this.playerHand.forEach((card, i) => {
                    const el = this.createCardElement(card, false);
                    const offset = (i - (this.playerHand.length - 1) / 2) * (window.innerWidth < 640 ? 48 : 58);
                    const rotation = (i - (this.playerHand.length - 1) / 2) * 4;
                    
                    el.style.left = `calc(50% + ${offset}px - (var(--card-w)/2))`;
                    el.style.bottom = '0px';
                    el.style.transform = `rotate(${rotation}deg)`;
                    
                    if (this.canPlay(card)) {
                        el.classList.add('playable');
                        el.onclick = () => this.playCard(i);
                    }
                    pHand.appendChild(el);
                });

                this.aiHand.forEach((card, i) => {
                    const el = this.createCardElement(card, true);
                    const offset = (i - (this.aiHand.length - 1) / 2) * 28;
                    el.style.left = `calc(50% + ${offset}px - (var(--card-w)/2))`;
                    el.style.top = '0px';
                    aHand.appendChild(el);
                });
            },

            renderTable() {
                const zone = document.getElementById('battleZone');
                zone.innerHTML = '';
                
                this.table.forEach((pair, i) => {
                    const container = document.createElement('div');
                    container.className = 'relative w-[var(--card-w)] h-[var(--card-h)]';
                    
                    const atk = this.createCardElement(pair.atk, false);
                    atk.style.position = 'absolute';
                    container.appendChild(atk);

                    if (pair.def) {
                        const def = this.createCardElement(pair.def, false);
                        def.style.position = 'absolute';
                        def.style.transform = 'translate(18px, 18px) rotate(12deg)';
                        container.appendChild(def);
                    }
                    zone.appendChild(container);
                });
            },

            renderDeck() {
                const tSlot = document.getElementById('trumpCardSlot');
                const dSlot = document.getElementById('deckStackSlot');
                const count = document.getElementById('deckCount');
                
                tSlot.innerHTML = '';
                dSlot.innerHTML = '';
                
                if (this.deck.length > 0) {
                    const tc = this.createCardElement(this.trump, false);
                    tc.style.transform = 'rotate(90deg) translate(0, 40px)';
                    tSlot.appendChild(tc);
                    
                    if (this.deck.length > 1) {
                        const ds = this.createCardElement(null, true);
                        dSlot.appendChild(ds);
                    }
                } else if (this.trump) {
                    // Only trump remains
                    const tc = this.createCardElement(this.trump, false);
                    tc.style.transform = 'rotate(90deg) translate(0, 40px)';
                    tSlot.appendChild(tc);
                }
                count.textContent = this.deck.length;
            },

            createCardElement(card, isHidden) {
                const wrapper = document.createElement('div');
                wrapper.className = `card-wrapper ${isHidden ? 'flipped' : ''}`;
                
                const redClass = card?.isRed ? 'card-red' : '';
                wrapper.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face ${redClass}">
                            <div class="flex flex-col leading-none">
                                <span class="text-lg">${card?.rank || ''}</span>
                                <span class="text-sm">${card?.s || ''}</span>
                            </div>
                            <div class="suit-center">${card?.s || ''}</div>
                            <div class="flex flex-col leading-none self-end rotate-180">
                                <span class="text-lg">${card?.rank || ''}</span>
                                <span class="text-sm">${card?.s || ''}</span>
                            </div>
                        </div>
                        <div class="card-back"></div>
                    </div>
                `;
                return wrapper;
            },

            canPlay(card) {
                if (this.turn !== 'player' || this.state !== 'playing') return false;

                if (this.isAttacking) {
                    if (this.table.length === 0) return true;
                    if (this.table.length >= 6) return false;
                    const ranksOnTable = this.table.flatMap(p => [p.atk.rank, p.def?.rank]).filter(Boolean);
                    return ranksOnTable.includes(card.rank);
                } else {
                    const lastPair = this.table[this.table.length - 1];
                    if (!lastPair || lastPair.def) return false;
                    const atk = lastPair.atk;
                    if (card.s === atk.s && card.val > atk.val) return true;
                    if (card.s === this.trump.s && atk.s !== this.trump.s) return true;
                    return false;
                }
            },

            playCard(idx) {
                const card = this.playerHand.splice(idx, 1)[0];
                App.haptic('light');

                if (this.isAttacking) {
                    this.table.push({ atk: card, def: null });
                } else {
                    this.table[this.table.length - 1].def = card;
                }

                this.updateUI();
                setTimeout(() => {
                    if (this.isAttacking) this.aiDefend();
                    else this.aiDecisionAfterDefend();
                }, 1000);
            },

            handleAction() {
                App.haptic('medium');
                if (this.isAttacking) {
                    this.endRound();
                } else {
                    this.takeCards('player');
                }
            },

            updateControls() {
                const ctrl = document.getElementById('controls');
                const btn = document.getElementById('mainActionBtn');
                
                if (this.state !== 'playing' || this.turn !== 'player') {
                    ctrl.classList.add('opacity-0', 'pointer-events-none', 'translate-y-10');
                    return;
                }

                ctrl.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-10');
                
                if (this.isAttacking) {
                    btn.textContent = 'БИТО';
                    btn.disabled = this.table.length === 0;
                } else {
                    btn.textContent = 'ВЗЯТЬ';
                    btn.disabled = false;
                }
            },

            aiMove() {
                if (this.state !== 'playing') return;
                
                if (this.isAttacking) {
                    let cardIdx = -1;
                    if (this.table.length === 0) {
                        cardIdx = this.findLowestCardIdx(this.aiHand, true);
                    } else {
                        const ranksOnTable = this.table.flatMap(p => [p.atk.rank, p.def?.rank]).filter(Boolean);
                        cardIdx = this.aiHand.findIndex(c => ranksOnTable.includes(c.rank) && c.s !== this.trump.s);
                    }

                    if (cardIdx !== -1 && this.table.length < 6) {
                        this.table.push({ atk: this.aiHand.splice(cardIdx, 1)[0], def: null });
                        this.turn = 'player';
                        this.updateUI();
                    } else {
                        this.endRound();
                    }
                } else {
                    this.aiDefend();
                }
            },

            aiDefend() {
                const lastPair = this.table[this.table.length - 1];
                if (!lastPair || lastPair.def) return;

                const atk = lastPair.atk;
                let bestDefIdx = -1;
                let minVal = 100;

                this.aiHand.forEach((c, i) => {
                    const canBeat = (c.s === atk.s && c.val > atk.val) || (c.s === this.trump.s && atk.s !== this.trump.s);
                    if (canBeat) {
                        const score = c.s === this.trump.s ? c.val + 20 : c.val;
                        if (score < minVal) {
                            minVal = score;
                            bestDefIdx = i;
                        }
                    }
                });

                if (bestDefIdx !== -1) {
                    this.table[this.table.length - 1].def = this.aiHand.splice(bestDefIdx, 1)[0];
                    this.updateUI();
                    setTimeout(() => this.aiDecisionAfterDefend(), 1000);
                } else {
                    this.takeCards('ai');
                }
            },

            aiDecisionAfterDefend() {
                if (this.isAttacking) {
                    this.turn = 'player';
                    this.updateUI();
                } else {
                    this.aiMove();
                }
            },

            findLowestCardIdx(hand, avoidTrump = false) {
                let minVal = 100;
                let idx = -1;
                hand.forEach((c, i) => {
                    if (avoidTrump && c.s === this.trump.s) return;
                    if (c.val < minVal) {
                        minVal = c.val;
                        idx = i;
                    }
                });
                if (idx === -1 && avoidTrump) return this.findLowestCardIdx(hand, false);
                return idx;
            },

            takeCards(who) {
                App.haptic('warning');
                const cardsToTake = this.table.flatMap(p => [p.atk, p.def]).filter(Boolean);
                if (who === 'player') this.playerHand.push(...cardsToTake);
                else this.aiHand.push(...cardsToTake);
                
                this.table = [];
                this.replenish();
                this.isAttacking = (who === 'ai');
                this.turn = this.isAttacking ? 'player' : 'ai';
                
                this.updateUI();
                if (this.turn === 'ai') setTimeout(() => this.aiMove(), 1500);
            },

            endRound() {
                App.haptic('success');
                this.table = [];
                this.replenish();
                this.isAttacking = !this.isAttacking;
                this.turn = this.isAttacking ? 'player' : 'ai';
                
                this.updateUI();
                if (this.turn === 'ai') setTimeout(() => this.aiMove(), 1500);
            },

            replenish() {
                while (this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while (this.aiHand.length < 6 && this.deck.length > 0) this.aiHand.push(this.deck.pop());
                this.checkGameOver();
            },

            checkGameOver() {
                if (this.deck.length === 0) {
                    if (this.playerHand.length === 0 && this.aiHand.length === 0) this.endGame('draw');
                    else if (this.playerHand.length === 0) this.endGame('win');
                    else if (this.aiHand.length === 0) this.endGame('lose');
                }
            },

            endGame(result) {
                this.state = 'over';
                const overlay = document.getElementById('resultOverlay');
                const title = document.getElementById('resultTitle');
                const text = document.getElementById('resultText');
                const icon = document.getElementById('resultIcon');

                overlay.style.display = 'flex';
                
                if (result === 'win') {
                    App.haptic('success');
                    const win = this.bet * 2;
                    App.db.balance += win;
                    App.db.turnover += this.bet;
                    title.textContent = 'VICTORY';
                    title.className = 'text-7xl font-black italic tracking-tighter mb-2 text-metro-accent';
                    text.textContent = `Вы выиграли ${win.toLocaleString()} ₽`;
                    icon.textContent = '🏆';
                } else if (result === 'lose') {
                    App.haptic('error');
                    App.db.turnover += this.bet;
                    title.textContent = 'DEFEAT';
                    title.className = 'text-7xl font-black italic tracking-tighter mb-2 text-rose-500';
                    text.textContent = `Вы проиграли ${this.bet.toLocaleString()} ₽`;
                    icon.textContent = '💀';
                } else {
                    App.haptic('warning');
                    App.db.balance += this.bet;
                    title.textContent = 'DRAW';
                    text.textContent = 'Ставка возвращена';
                    icon.textContent = '🤝';
                }
                
                localStorage.setItem('metro_vault', JSON.stringify(App.db));
            }
        };

        window.onload = () => Game.init();
    </script>
</body>
</html>
