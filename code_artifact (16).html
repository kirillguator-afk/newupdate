<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>METRO DURAK P2P | NEXUS ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        metro: { 
                            black: '#050505', 
                            dark: '#0a0a0a', 
                            accent: '#fbbf24',
                            gold: '#d97706',
                            emerald: '#10b981',
                            rose: '#f43f5e',
                            slate: '#1e293b'
                        }
                    },
                    boxShadow: {
                        'premium': '0 20px 50px -12px rgba(0, 0, 0, 0.8)',
                        'glow': '0 0 20px rgba(251, 191, 36, 0.2)'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #050505);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --card-w: 76px;
            --card-h: 110px;
        }

        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .felt-surface {
            background: 
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.15) 0%, transparent 80%),
                radial-gradient(circle at 100% 0%, rgba(251, 191, 36, 0.05) 0%, transparent 40%),
                #050505;
            position: relative;
            height: 100%;
        }

        .felt-surface::after {
            content: ""; position: absolute; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            opacity: 0.03; pointer-events: none;
        }

        /* Card Architecture */
        .card-node {
            width: var(--card-w);
            height: var(--card-h);
            position: absolute;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 12px;
            background: #ffffff;
            color: #1a1a1a;
            padding: 8px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(0,0,0,0.05);
            font-weight: 800;
        }

        .card-back {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            transform: rotateY(180deg);
            border: 3px solid #ffffff;
            display: flex; align-items: center; justify-content: center;
        }

        .card-back::before {
            content: "M"; font-size: 2.5rem; color: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            width: 80%; height: 80%; display: flex; align-items: center; justify-content: center; border-radius: 8px;
        }

        .is-flipped .card-inner { transform: rotateY(180deg); }
        .card-red { color: #e11d48; }
        
        .playable:hover { transform: translateY(-25px) scale(1.05) !important; z-index: 100 !important; }
        .playable:active { transform: translateY(-15px) scale(0.95) !important; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-primary {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #050505;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 30px rgba(217, 119, 6, 0.3);
            transition: all 0.3s ease;
        }

        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
        .btn-primary:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }

        #battle-grid {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 260px; display: flex; justify-content: center; align-items: center; gap: 12px;
        }

        .status-indicator {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 6px;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
        .active-turn { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="felt-surface">

    <!-- HUD Layer -->
    <header class="fixed top-0 w-full z-50 px-6 py-5 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-4">
            <button onclick="Nexus.exit()" class="w-11 h-11 rounded-2xl bg-white/5 flex items-center justify-center border border-white/10 active:scale-90 transition">
                <i class="fa-solid fa-arrow-left text-metro-accent"></i>
            </button>
            <div>
                <div class="text-[10px] text-metro-muted font-black uppercase tracking-[0.2em] leading-none mb-1">P2P Network</div>
                <div id="net-status" class="text-xs font-bold text-white flex items-center">
                    <span class="status-indicator bg-gray-500"></span>
                    DISCONNECTED
                </div>
            </div>
        </div>
        <div class="text-right">
            <span class="text-[10px] text-gray-500 font-black uppercase tracking-widest block">Vault Balance</span>
            <div class="font-black text-white text-xl" id="ui-balance">0 ₽</div>
        </div>
    </header>

    <!-- Game Arena -->
    <main class="relative h-full w-full pt-24 pb-40">
        <!-- Opponent Hand -->
        <div id="opponent-hand" class="absolute top-28 left-0 right-0 h-[var(--card-h)] flex justify-center pointer-events-none"></div>

        <!-- Deck & Trump -->
        <div class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col items-center gap-4 z-10">
            <div id="deck-area" class="relative w-[var(--card-w)] h-[var(--card-h)]">
                <div id="trump-slot" class="absolute inset-0"></div>
                <div id="deck-stack" class="absolute inset-0 -translate-x-2"></div>
            </div>
            <div id="deck-count" class="bg-black/80 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] font-black border border-white/10 shadow-xl">0</div>
        </div>

        <!-- Battle Zone -->
        <div id="battle-grid"></div>

        <!-- Player Hand -->
        <div id="player-hand" class="absolute bottom-36 left-0 right-0 h-[var(--card-h)] flex justify-center"></div>

        <!-- Action Bar -->
        <div id="action-bar" class="absolute bottom-10 left-0 right-0 px-8 flex justify-center gap-4 z-40 opacity-0 translate-y-10 transition-all duration-500">
            <button id="btn-action" onclick="Engine.handleAction()" class="btn-primary w-full max-w-md py-5 rounded-3xl text-lg italic">
                БИТО
            </button>
        </div>
    </main>

    <!-- Connection Overlay -->
    <div id="overlay-connect" class="fixed inset-0 z-[100] glass-panel flex items-center justify-center p-8">
        <div class="w-full max-w-sm text-center space-y-8">
            <div class="relative inline-block">
                <div class="w-24 h-24 bg-metro-accent/10 rounded-[2.5rem] flex items-center justify-center border border-metro-accent/20 mx-auto">
                    <i class="fa-solid fa-tower-broadcast text-4xl text-metro-accent animate-pulse"></i>
                </div>
            </div>
            
            <div>
                <h2 class="text-4xl font-black italic tracking-tighter uppercase">Durak <span class="text-metro-accent">Elite</span></h2>
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-[0.4em] mt-3">Peer-to-Peer Protocol</p>
            </div>

            <div class="bg-black/60 rounded-[3rem] p-8 border border-white/5 shadow-premium">
                <div class="mb-8">
                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-3">Table Stake</span>
                    <div class="text-5xl font-black text-white" id="ui-bet">0 <span class="text-metro-accent text-2xl">₽</span></div>
                </div>
                
                <div class="flex justify-between items-center gap-3 mb-8">
                    <div onclick="Engine.adjustBet(100)" class="flex-1 py-3 rounded-2xl bg-white/5 border border-white/10 text-xs font-black hover:bg-white/10 transition cursor-pointer">100</div>
                    <div onclick="Engine.adjustBet(500)" class="flex-1 py-3 rounded-2xl bg-white/5 border border-white/10 text-xs font-black hover:bg-white/10 transition cursor-pointer">500</div>
                    <div onclick="Engine.adjustBet(1000)" class="flex-1 py-3 rounded-2xl bg-white/5 border border-white/10 text-xs font-black hover:bg-white/10 transition cursor-pointer">1K</div>
                </div>

                <button id="btn-connect" onclick="Network.connect()" class="btn-primary w-full py-5 rounded-2xl text-sm">
                    FIND OPPONENT
                </button>
            </div>
        </div>
    </div>

    <!-- Result Overlay -->
    <div id="overlay-result" class="fixed inset-0 z-[110] hidden glass-panel flex items-center justify-center p-8">
        <div class="text-center animate-in fade-in zoom-in duration-300">
            <div id="res-icon" class="text-9xl mb-6 drop-shadow-[0_0_30px_rgba(251,191,36,0.5)]">🏆</div>
            <h2 id="res-title" class="text-7xl font-black italic tracking-tighter mb-4">VICTORY</h2>
            <p id="res-desc" class="text-gray-400 font-bold mb-12 uppercase tracking-[0.2em]">You earned 2,000 ₽</p>
            <button onclick="location.reload()" class="btn-primary px-16 py-6 rounded-3xl text-xl">NEW SESSION</button>
        </div>
    </div>

    <script>
        /**
         * NEXUS ARCHITECT - DURAK P2P ENGINE
         * High-performance, modular, and secure.
         */

        const TG = window.Telegram?.WebApp;
        const SUITS = [
            { s: '♠', id: 'spades', red: false },
            { s: '♣', id: 'clubs', red: false },
            { s: '♥', id: 'hearts', red: true },
            { s: '♦', id: 'diamonds', red: true }
        ];
        const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        const RANK_VAL = { '6': 6, '7': 7, '8': 8, '9': 9, '10': 10, 'J': 11, 'Q': 12, 'K': 13, 'A': 14 };

        const Nexus = {
            vault: JSON.parse(localStorage.getItem('metro_vault')) || { balance: 5000, turnover: 0 },
            
            init() {
                if (TG) {
                    TG.ready();
                    TG.expand();
                    TG.headerColor = '#050505';
                }
                this.syncUI();
            },

            syncUI() {
                document.getElementById('ui-balance').textContent = this.vault.balance.toLocaleString() + ' ₽';
                localStorage.setItem('metro_vault', JSON.stringify(this.vault));
            },

            haptic(type = 'light') {
                if (!TG) return;
                if (['success', 'warning', 'error'].includes(type)) TG.HapticFeedback.notificationOccurred(type);
                else TG.HapticFeedback.impactOccurred(type);
            },

            exit() {
                window.location.href = 'metro_cash_app.html';
            }
        };

        const Network = {
            peer: null,
            role: null, // 'host' or 'guest'
            status: 'disconnected',

            async connect() {
                if (Engine.bet <= 0) return;
                
                const btn = document.getElementById('btn-connect');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> SEARCHING...';
                
                Nexus.haptic('medium');

                // Simulated P2P Handshake (PearJS Logic)
                // In a real PearJS app, this would use hyperswarm.join(topic)
                setTimeout(() => {
                    this.status = 'connected';
                    this.role = Math.random() > 0.5 ? 'host' : 'guest';
                    this.onConnected();
                }, 2000);
            },

            onConnected() {
                document.getElementById('net-status').innerHTML = `<span class="status-indicator bg-metro-emerald animate-pulse"></span> ONLINE | ${this.role.toUpperCase()}`;
                document.getElementById('overlay-connect').style.display = 'none';
                Engine.initGame();
            },

            send(type, data) {
                console.log(`[P2P SEND] ${type}`, data);
                // Simulated network latency
                setTimeout(() => this.onMessage({ type, data }), 150);
            },

            onMessage(msg) {
                switch(msg.type) {
                    case 'SYNC_STATE': Engine.syncState(msg.data); break;
                    case 'MOVE': Engine.onRemoteMove(msg.data); break;
                    case 'ACTION': Engine.onRemoteAction(msg.data); break;
                }
            }
        };

        const Engine = {
            deck: [],
            playerHand: [],
            opponentHand: [],
            table: [],
            trump: null,
            bet: 0,
            turn: null, // 'me' or 'peer'
            isAttacker: false,
            gameState: 'waiting',

            adjustBet(val) {
                if (Nexus.vault.balance >= val) {
                    this.bet += val;
                    Nexus.vault.balance -= val;
                    Nexus.haptic('light');
                    document.getElementById('ui-bet').textContent = this.bet.toLocaleString();
                    Nexus.syncUI();
                }
            },

            initGame() {
                this.gameState = 'playing';
                if (Network.role === 'host') {
                    this.buildDeck();
                    this.deal();
                    this.determineFirstTurn();
                    this.broadcastState();
                }
                this.render();
            },

            buildDeck() {
                this.deck = [];
                SUITS.forEach(s => RANKS.forEach(r => this.deck.push({ ...s, rank: r, val: RANK_VAL[r] })));
                for (let i = this.deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
                }
                this.trump = this.deck[0];
            },

            deal() {
                while (this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while (this.opponentHand.length < 6 && this.deck.length > 0) this.opponentHand.push(this.deck.pop());
            },

            determineFirstTurn() {
                const myMinTrump = Math.min(...this.playerHand.filter(c => c.s === this.trump.s).map(c => c.val), 100);
                const peerMinTrump = Math.min(...this.opponentHand.filter(c => c.s === this.trump.s).map(c => c.val), 100);
                
                this.turn = myMinTrump <= peerMinTrump ? 'me' : 'peer';
                this.isAttacker = (this.turn === 'me');
            },

            broadcastState() {
                Network.send('SYNC_STATE', {
                    deck: this.deck,
                    playerHand: this.opponentHand, // Swapped for peer
                    opponentHand: this.playerHand, // Swapped for peer
                    trump: this.trump,
                    turn: this.turn === 'me' ? 'peer' : 'me',
                    isAttacker: !this.isAttacker,
                    table: this.table
                });
            },

            syncState(data) {
                this.deck = data.deck;
                this.playerHand = data.playerHand;
                this.opponentHand = data.opponentHand;
                this.trump = data.trump;
                this.turn = data.turn;
                this.isAttacker = data.isAttacker;
                this.table = data.table;
                this.render();
            },

            render() {
                this.renderHand('player-hand', this.playerHand, true);
                this.renderHand('opponent-hand', this.opponentHand, false);
                this.renderTable();
                this.renderDeck();
                this.updateControls();
            },

            renderHand(id, hand, isPlayer) {
                const container = document.getElementById(id);
                container.innerHTML = '';
                
                if (isPlayer) hand.sort((a, b) => (a.s === this.trump.s ? a.val + 20 : a.val) - (b.s === this.trump.s ? b.val + 20 : b.val));

                hand.forEach((card, i) => {
                    const el = this.createCardEl(card, !isPlayer);
                    const offset = (i - (hand.length - 1) / 2) * (isPlayer ? 50 : 30);
                    const rotation = isPlayer ? (i - (hand.length - 1) / 2) * 4 : 0;
                    
                    el.style.left = `calc(50% + ${offset}px - (var(--card-w)/2))`;
                    if (isPlayer) {
                        el.style.bottom = '0px';
                        el.style.transform = `rotate(${rotation}deg)`;
                        if (this.canPlay(card)) {
                            el.classList.add('playable');
                            el.onclick = () => this.playCard(i);
                        }
                    } else {
                        el.style.top = '0px';
                    }
                    container.appendChild(el);
                });
            },

            renderTable() {
                const grid = document.getElementById('battle-grid');
                grid.innerHTML = '';
                this.table.forEach(pair => {
                    const wrap = document.createElement('div');
                    wrap.className = 'relative w-[var(--card-w)] h-[var(--card-h)]';
                    
                    const atk = this.createCardEl(pair.atk, false);
                    wrap.appendChild(atk);

                    if (pair.def) {
                        const def = this.createCardEl(pair.def, false);
                        def.style.transform = 'translate(15px, 15px) rotate(10deg)';
                        wrap.appendChild(def);
                    }
                    grid.appendChild(wrap);
                });
            },

            renderDeck() {
                const tSlot = document.getElementById('trump-slot');
                const dStack = document.getElementById('deck-stack');
                const count = document.getElementById('deck-count');
                
                tSlot.innerHTML = ''; dStack.innerHTML = '';
                
                if (this.deck.length > 0) {
                    const tc = this.createCardEl(this.trump, false);
                    tc.style.transform = 'rotate(90deg) translate(0, 35px)';
                    tSlot.appendChild(tc);
                    
                    if (this.deck.length > 1) {
                        dStack.appendChild(this.createCardEl(null, true));
                    }
                }
                count.textContent = this.deck.length;
            },

            createCardEl(card, hidden) {
                const div = document.createElement('div');
                div.className = `card-node ${hidden ? 'is-flipped' : ''}`;
                const red = card?.red ? 'card-red' : '';
                div.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face ${red}">
                            <div class="flex flex-col leading-none">
                                <span class="text-sm">${card?.rank || ''}</span>
                                <span class="text-xs">${card?.s || ''}</span>
                            </div>
                            <div class="text-3xl opacity-10 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">${card?.s || ''}</div>
                            <div class="flex flex-col leading-none self-end rotate-180">
                                <span class="text-sm">${card?.rank || ''}</span>
                                <span class="text-xs">${card?.s || ''}</span>
                            </div>
                        </div>
                        <div class="card-back"></div>
                    </div>
                `;
                return div;
            },

            canPlay(card) {
                if (this.turn !== 'me') return false;
                if (this.isAttacker) {
                    if (this.table.length === 0) return true;
                    if (this.table.length >= 6) return false;
                    const ranks = this.table.flatMap(p => [p.atk.rank, p.def?.rank]).filter(Boolean);
                    return ranks.includes(card.rank);
                } else {
                    const last = this.table[this.table.length - 1];
                    if (!last || last.def) return false;
                    return (card.s === last.atk.s && card.val > last.atk.val) || (card.s === this.trump.s && last.atk.s !== this.trump.s);
                }
            },

            playCard(idx) {
                const card = this.playerHand.splice(idx, 1)[0];
                Nexus.haptic('light');
                
                if (this.isAttacker) {
                    this.table.push({ atk: card, def: null });
                } else {
                    this.table[this.table.length - 1].def = card;
                }

                this.turn = 'peer';
                this.render();
                Network.send('MOVE', { card, table: this.table });
            },

            onRemoteMove(data) {
                Nexus.haptic('medium');
                this.opponentHand.pop();
                this.table = data.table;
                this.turn = 'me';
                this.render();
            },

            handleAction() {
                Nexus.haptic('medium');
                const action = this.isAttacker ? 'BITO' : 'TAKE';
                Network.send('ACTION', { action });
                this.processAction(action, 'me');
            },

            onRemoteAction(data) {
                this.processAction(data.action, 'peer');
            },

            processAction(action, who) {
                if (action === 'BITO') {
                    this.table = [];
                    this.replenish();
                    this.isAttacker = (who !== 'me');
                    this.turn = this.isAttacker ? 'me' : 'peer';
                } else {
                    const cards = this.table.flatMap(p => [p.atk, p.def]).filter(Boolean);
                    if (who === 'me') this.playerHand.push(...cards);
                    else this.opponentHand.push(...cards);
                    this.table = [];
                    this.replenish();
                    this.isAttacker = (who === 'me'); // If I take, peer attacks again
                    this.turn = this.isAttacker ? 'me' : 'peer';
                }
                this.render();
            },

            replenish() {
                while (this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while (this.opponentHand.length < 6 && this.deck.length > 0) this.opponentHand.push(this.deck.pop());
                this.checkEnd();
            },

            updateControls() {
                const bar = document.getElementById('action-bar');
                const btn = document.getElementById('btn-action');
                
                if (this.turn === 'me' && this.gameState === 'playing') {
                    bar.classList.remove('opacity-0', 'translate-y-10');
                    btn.textContent = this.isAttacker ? 'БИТО' : 'ВЗЯТЬ';
                    btn.disabled = this.isAttacker && this.table.length === 0;
                    btn.classList.toggle('active-turn', !btn.disabled);
                } else {
                    bar.classList.add('opacity-0', 'translate-y-10');
                }
            },

            checkEnd() {
                if (this.deck.length === 0) {
                    if (this.playerHand.length === 0 && this.opponentHand.length === 0) this.endGame('draw');
                    else if (this.playerHand.length === 0) this.endGame('win');
                    else if (this.opponentHand.length === 0) this.endGame('lose');
                }
            },

            endGame(res) {
                this.gameState = 'over';
                const overlay = document.getElementById('overlay-result');
                const title = document.getElementById('res-title');
                const desc = document.getElementById('res-desc');
                const icon = document.getElementById('res-icon');

                overlay.style.display = 'flex';
                if (res === 'win') {
                    Nexus.haptic('success');
                    const win = this.bet * 2;
                    Nexus.vault.balance += win;
                    title.textContent = 'VICTORY';
                    title.className = 'text-7xl font-black italic text-metro-accent';
                    desc.textContent = `You earned ${win.toLocaleString()} ₽`;
                    icon.textContent = '🏆';
                } else if (res === 'lose') {
                    Nexus.haptic('error');
                    title.textContent = 'DEFEAT';
                    title.className = 'text-7xl font-black italic text-metro-rose';
                    desc.textContent = `You lost ${this.bet.toLocaleString()} ₽`;
                    icon.textContent = '💀';
                } else {
                    Nexus.vault.balance += this.bet;
                    title.textContent = 'DRAW';
                    desc.textContent = 'Stake returned';
                    icon.textContent = '🤝';
                }
                Nexus.syncUI();
            }
        };

        window.onload = () => Nexus.init();
    </script>
