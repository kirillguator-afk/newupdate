<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>METRO DURAK P2P | NEXUS ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        metro: { 
                            black: '#050505', 
                            dark: '#0a0a0a', 
                            accent: '#fbbf24',
                            gold: '#d97706',
                            emerald: '#10b981',
                            rose: '#f43f5e',
                            slate: '#1e293b',
                            muted: '#52525b'
                        }
                    },
                    boxShadow: {
                        'premium': '0 25px 50px -12px rgba(0, 0, 0, 0.8)',
                        'glow': '0 0 20px rgba(251, 191, 36, 0.3)',
                        'accent-glow': '0 0 30px rgba(251, 191, 36, 0.4)'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #050505);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --card-w: 72px;
            --card-h: 104px;
        }

        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .arena-surface {
            background: 
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.1) 0%, transparent 80%),
                radial-gradient(circle at 0% 100%, rgba(251, 191, 36, 0.03) 0%, transparent 40%),
                #050505;
            position: relative;
            height: 100%;
        }

        .card-node {
            width: var(--card-w);
            height: var(--card-h);
            position: absolute;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            perspective: 1000px;
            z-index: 10;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 10px;
            background: #ffffff;
            color: #1a1a1a;
            padding: 6px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(0,0,0,0.05);
            font-weight: 800;
        }

        .card-back {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            transform: rotateY(180deg);
            border: 2px solid #ffffff;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
        }

        .card-back::after {
            content: "M"; font-size: 2rem; color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            width: 70%; height: 70%; display: flex; align-items: center; justify-content: center; border-radius: 6px;
        }

        .is-flipped .card-inner { transform: rotateY(180deg); }
        .card-red { color: #e11d48; }
        
        .playable { cursor: pointer; }
        .playable:hover { transform: translateY(-20px) scale(1.05) !important; z-index: 100 !important; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-action {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #050505;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(217, 119, 6, 0.3);
            transition: all 0.3s ease;
        }

        .btn-action:disabled { opacity: 0.3; filter: grayscale(1); }

        #battle-grid {
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 240px; display: flex; justify-content: center; align-items: center; gap: 10px;
            flex-wrap: wrap;
        }

        .trump-indicator {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        @keyframes deal-anim {
            from { transform: translate(200px, -200px) rotate(45deg); opacity: 0; }
            to { opacity: 1; }
        }

        .shimmer {
            position: relative; overflow: hidden;
        }
        .shimmer::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shimmer-anim 3s infinite;
        }
        @keyframes shimmer-anim { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
    </style>
</head>
<body class="arena-surface">

    <!-- HUD -->
    <header class="fixed top-0 w-full z-50 px-6 py-6 flex justify-between items-center bg-black/40 backdrop-blur-2xl border-b border-white/5">
        <div class="flex items-center gap-4">
            <button onclick="Engine.exit()" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center border border-white/10 active:scale-90 transition">
                <i class="fa-solid fa-chevron-left text-metro-accent"></i>
            </button>
            <div>
                <div class="text-[8px] text-metro-muted font-black uppercase tracking-[0.3em] leading-none mb-1">P2P Session</div>
                <div id="net-status" class="text-[10px] font-black text-white flex items-center">
                    <span class="w-1.5 h-1.5 rounded-full bg-metro-emerald mr-2 animate-pulse"></span>
                    LIVE NODE
                </div>
            </div>
        </div>
        <div class="text-right">
            <span class="text-[8px] text-metro-muted font-black uppercase tracking-widest block mb-1">Vault Balance</span>
            <div class="font-black text-white text-lg tracking-tighter" id="ui-balance">0 ₽</div>
        </div>
    </header>

    <!-- Game Arena -->
    <main class="relative h-full w-full pt-24 pb-40">
        <!-- Opponent -->
        <div id="opponent-hand" class="absolute top-28 left-0 right-0 h-[var(--card-h)] flex justify-center pointer-events-none"></div>

        <!-- Deck & Trump -->
        <div class="trump-indicator z-20">
            <div id="deck-area" class="relative w-[var(--card-w)] h-[var(--card-h)]">
                <div id="trump-slot" class="absolute inset-0"></div>
                <div id="deck-stack" class="absolute inset-0 -translate-x-1 -translate-y-1"></div>
            </div>
            <div id="deck-count" class="bg-black/60 backdrop-blur-lg px-4 py-1.5 rounded-full text-[10px] font-black border border-white/10 text-metro-accent">0</div>
        </div>

        <!-- Battle Zone -->
        <div id="battle-grid"></div>

        <!-- Player -->
        <div id="player-hand" class="absolute bottom-36 left-0 right-0 h-[var(--card-h)] flex justify-center"></div>

        <!-- Action Bar -->
        <div id="action-bar" class="absolute bottom-10 left-0 right-0 px-8 flex justify-center gap-4 z-40 opacity-0 pointer-events-none transition-all duration-500">
            <button id="btn-action" onclick="Engine.handleAction()" class="btn-action w-full max-w-xs py-5 rounded-2xl text-sm italic tracking-tighter shimmer">
                БИТО
            </button>
        </div>
    </main>

    <!-- Pre-game Lobby Overlay -->
    <div id="overlay-lobby" class="fixed inset-0 z-[100] glass-panel flex items-center justify-center p-8">
        <div class="w-full max-w-sm text-center space-y-8">
            <div class="w-24 h-24 bg-metro-accent/10 rounded-[2.5rem] flex items-center justify-center border border-metro-accent/20 mx-auto shadow-accent-glow">
                <i class="fa-solid fa-tower-broadcast text-4xl text-metro-accent animate-pulse"></i>
            </div>
            <div>
                <h2 class="text-4xl font-black italic tracking-tighter uppercase">Durak <span class="text-metro-accent">Elite</span></h2>
                <p class="text-metro-muted text-[9px] font-black uppercase tracking-[0.4em] mt-3">Nexus P2P Network</p>
            </div>
            <div class="bg-black/40 rounded-[3rem] p-8 border border-white/5 shadow-premium">
                <div class="mb-8">
                    <span class="text-[9px] font-black text-metro-muted uppercase tracking-widest block mb-3">Table Stake</span>
                    <div class="text-5xl font-black text-white tracking-tighter" id="lobby-bet">0 <span class="text-metro-accent text-2xl">₽</span></div>
                </div>
                <button id="btn-start" onclick="Engine.startFromLobby()" class="btn-action w-full py-5 rounded-2xl text-sm shimmer">
                    FIND OPPONENT
                </button>
            </div>
        </div>
    </div>

    <!-- Result Overlay -->
    <div id="overlay-result" class="fixed inset-0 z-[110] hidden glass-panel flex items-center justify-center p-10">
        <div class="text-center">
            <div id="res-icon" class="text-8xl mb-6">🏆</div>
            <h2 id="res-title" class="text-6xl font-black italic tracking-tighter mb-4">VICTORY</h2>
            <p id="res-desc" class="text-metro-muted font-black mb-12 uppercase tracking-[0.2em]">You earned 0 ₽</p>
            <button onclick="Engine.exit()" class="btn-action px-12 py-5 rounded-2xl text-sm shimmer">RETURN TO HUB</button>
        </div>
    </div>

    <script>
        const TG = window.Telegram?.WebApp;
        const SUITS = [
            { s: '♠', id: 'spades', red: false },
            { s: '♣', id: 'clubs', red: false },
            { s: '♥', id: 'hearts', red: true },
            { s: '♦', id: 'diamonds', red: true }
        ];
        const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        const RANK_VAL = { '6': 6, '7': 7, '8': 8, '9': 9, '10': 10, 'J': 11, 'Q': 12, 'K': 13, 'A': 14 };

        const Engine = {
            vault: JSON.parse(localStorage.getItem('metro_vault')) || { balance: 5000, turnover: 0, wins: 0, history: [] },
            deck: [],
            playerHand: [],
            opponentHand: [],
            table: [],
            trump: null,
            bet: 0,
            turn: 'me', // 'me' or 'peer'
            isAttacker: true,
            gameState: 'lobby',

            init() {
                if (TG) {
                    TG.ready();
                    TG.expand();
                }
                
                // Read stake from URL if provided
                const params = new URLSearchParams(window.location.search);
                const stakeParam = parseInt(params.get('stake'));
                if (stakeParam) {
                    this.bet = stakeParam;
                    document.getElementById('lobby-bet').textContent = this.bet.toLocaleString();
                }

                this.syncUI();
            },

            syncUI() {
                document.getElementById('ui-balance').textContent = Math.floor(this.vault.balance).toLocaleString() + ' ₽';
                localStorage.setItem('metro_vault', JSON.stringify(this.vault));
            },

            haptic(type = 'light') {
                if (!TG) return;
                if (['success', 'warning', 'error'].includes(type)) TG.HapticFeedback.notificationOccurred(type);
                else TG.HapticFeedback.impactOccurred(type);
            },

            startFromLobby() {
                if (this.bet > this.vault.balance) {
                    alert("Недостаточно средств!");
                    return;
                }
                
                this.haptic('medium');
                const btn = document.getElementById('btn-start');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> CONNECTING...';

                setTimeout(() => {
                    document.getElementById('overlay-lobby').style.display = 'none';
                    this.vault.balance -= this.bet;
                    this.vault.turnover += this.bet;
                    this.syncUI();
                    this.initGame();
                }, 1500);
            },

            initGame() {
                this.gameState = 'playing';
                this.buildDeck();
                this.deal();
                this.determineFirstTurn();
                this.render();
            },

            buildDeck() {
                this.deck = [];
                SUITS.forEach(s => RANKS.forEach(r => this.deck.push({ ...s, rank: r, val: RANK_VAL[r] })));
                for (let i = this.deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
                }
                this.trump = this.deck[0];
            },

            deal() {
                while (this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while (this.opponentHand.length < 6 && this.deck.length > 0) this.opponentHand.push(this.deck.pop());
            },

            determineFirstTurn() {
                const myMinTrump = Math.min(...this.playerHand.filter(c => c.s === this.trump.s).map(c => c.val), 100);
                const peerMinTrump = Math.min(...this.opponentHand.filter(c => c.s === this.trump.s).map(c => c.val), 100);
                this.turn = myMinTrump <= peerMinTrump ? 'me' : 'peer';
                this.isAttacker = (this.turn === 'me');
                
                if (this.turn === 'peer') setTimeout(() => this.opponentMove(), 1000);
            },

            render() {
                this.renderHand('player-hand', this.playerHand, true);
                this.renderHand('opponent-hand', this.opponentHand, false);
                this.renderTable();
                this.renderDeck();
                this.updateControls();
            },

            renderHand(id, hand, isPlayer) {
                const container = document.getElementById(id);
                container.innerHTML = '';
                
                if (isPlayer) {
                    hand.sort((a, b) => (a.s === this.trump.s ? a.val + 20 : a.val) - (b.s === this.trump.s ? b.val + 20 : b.val));
                }

                hand.forEach((card, i) => {
                    const el = this.createCardEl(card, !isPlayer);
                    const offset = (i - (hand.length - 1) / 2) * (isPlayer ? 40 : 20);
                    const rotation = isPlayer ? (i - (hand.length - 1) / 2) * 4 : 0;
                    
                    el.style.left = `calc(50% + ${offset}px - (var(--card-w)/2))`;
                    if (isPlayer) {
                        el.style.bottom = '10px';
                        el.style.transform = `rotate(${rotation}deg)`;
                        if (this.canPlay(card)) {
                            el.classList.add('playable');
                            el.onclick = () => this.playCard(i);
                        }
                    } else {
                        el.style.top = '0px';
                    }
                    container.appendChild(el);
                });
            },

            renderTable() {
                const grid = document.getElementById('battle-grid');
                grid.innerHTML = '';
                this.table.forEach(pair => {
                    const wrap = document.createElement('div');
                    wrap.className = 'relative w-[var(--card-w)] h-[var(--card-h)]';
                    
                    const atk = this.createCardEl(pair.atk, false);
                    wrap.appendChild(atk);

                    if (pair.def) {
                        const def = this.createCardEl(pair.def, false);
                        def.style.transform = 'translate(15px, 15px) rotate(10deg)';
                        def.style.zIndex = '20';
                        wrap.appendChild(def);
                    }
                    grid.appendChild(wrap);
                });
            },

            renderDeck() {
                const tSlot = document.getElementById('trump-slot');
                const dStack = document.getElementById('deck-stack');
                const count = document.getElementById('deck-count');
                
                tSlot.innerHTML = ''; dStack.innerHTML = '';
                
                if (this.deck.length > 0) {
                    const tc = this.createCardEl(this.trump, false);
                    tc.style.transform = 'rotate(90deg) translate(0, 35px)';
                    tSlot.appendChild(tc);
                    
                    if (this.deck.length > 1) {
                        const back = this.createCardEl(null, true);
                        dStack.appendChild(back);
                    }
                } else if (this.trump) {
                    // Only trump remains
                    const tc = this.createCardEl(this.trump, false);
                    tc.style.transform = 'rotate(90deg) translate(0, 35px) opacity(0.5)';
                    tSlot.appendChild(tc);
                }
                count.textContent = this.deck.length;
            },

            createCardEl(card, hidden) {
                const div = document.createElement('div');
                div.className = `card-node ${hidden ? 'is-flipped' : ''}`;
                const red = card?.red ? 'card-red' : '';
                div.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face ${red}">
                            <div class="flex flex-col leading-none">
                                <span class="text-xs">${card?.rank || ''}</span>
                                <span class="text-[10px]">${card?.s || ''}</span>
                            </div>
                            <div class="text-3xl opacity-10 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">${card?.s || ''}</div>
                            <div class="flex flex-col leading-none self-end rotate-180">
                                <span class="text-xs">${card?.rank || ''}</span>
                                <span class="text-[10px]">${card?.s || ''}</span>
                            </div>
                        </div>
                        <div class="card-back"></div>
                    </div>
                `;
                return div;
            },

            canPlay(card) {
                if (this.turn !== 'me') return false;
                if (this.isAttacker) {
                    if (this.table.length === 0) return true;
                    if (this.table.length >= 6 || this.table.length >= this.opponentHand.length) return false;
                    const ranksOnTable = this.table.flatMap(p => [p.atk.rank, p.def?.rank]).filter(Boolean);
                    return ranksOnTable.includes(card.rank);
                } else {
                    const lastPair = this.table[this.table.length - 1];
                    if (!lastPair || lastPair.def) return false;
                    const atk = lastPair.atk;
                    // Defense logic
                    if (card.s === atk.s) return card.val > atk.val;
                    if (card.s === this.trump.s) return true;
                    return false;
                }
            },

            playCard(idx) {
                const card = this.playerHand.splice(idx, 1)[0];
                this.haptic('light');
                
                if (this.isAttacker) {
                    this.table.push({ atk: card, def: null });
                    this.turn = 'peer';
                    setTimeout(() => this.opponentMove(), 1000);
                } else {
                    this.table[this.table.length - 1].def = card;
                    this.turn = 'peer';
                    setTimeout(() => this.opponentMove(), 1000);
                }
                this.render();
            },

            opponentMove() {
                if (this.gameState !== 'playing' || this.turn !== 'peer') return;

                if (this.isAttacker) {
                    // Opponent is defending
                    const lastPair = this.table[this.table.length - 1];
                    const atk = lastPair.atk;
                    const defCardIdx = this.opponentHand.findIndex(c => 
                        (c.s === atk.s && c.val > atk.val) || (c.s === this.trump.s && atk.s !== this.trump.s)
                    );

                    if (defCardIdx !== -1) {
                        const card = this.opponentHand.splice(defCardIdx, 1)[0];
                        this.table[this.table.length - 1].def = card;
                        this.turn = 'me';
                        this.haptic('medium');
                    } else {
                        // Opponent takes cards
                        setTimeout(() => this.processAction('TAKE', 'peer'), 500);
                        return;
                    }
                } else {
                    // Opponent is attacking
                    let atkCardIdx = -1;
                    if (this.table.length === 0) {
                        atkCardIdx = Math.floor(Math.random() * this.opponentHand.length);
                    } else {
                        const ranksOnTable = this.table.flatMap(p => [p.atk.rank, p.def?.rank]).filter(Boolean);
                        atkCardIdx = this.opponentHand.findIndex(c => ranksOnTable.includes(c.rank));
                    }

                    if (atkCardIdx !== -1 && this.table.length < 6 && this.table.length < this.playerHand.length) {
                        const card = this.opponentHand.splice(atkCardIdx, 1)[0];
                        this.table.push({ atk: card, def: null });
                        this.turn = 'me';
                        this.haptic('medium');
                    } else {
                        // Opponent says "Bito"
                        setTimeout(() => this.processAction('BITO', 'peer'), 500);
                        return;
                    }
                }
                this.render();
            },

            handleAction() {
                const action = this.isAttacker ? 'BITO' : 'TAKE';
                this.processAction(action, 'me');
            },

            processAction(action, who) {
                this.haptic('medium');
                if (action === 'BITO') {
                    this.table = [];
                    this.replenish();
                    this.isAttacker = (who !== 'me');
                    this.turn = this.isAttacker ? 'me' : 'peer';
                } else {
                    const cards = this.table.flatMap(p => [p.atk, p.def]).filter(Boolean);
                    if (who === 'me') this.playerHand.push(...cards);
                    else this.opponentHand.push(...cards);
                    this.table = [];
                    this.replenish();
                    this.isAttacker = (who === 'me'); 
                    this.turn = this.isAttacker ? 'me' : 'peer';
                }
                
                this.render();
                if (this.turn === 'peer') setTimeout(() => this.opponentMove(), 1000);
            },

            replenish() {
                while (this.playerHand.length < 6 && this.deck.length > 0) this.playerHand.push(this.deck.pop());
                while (this.opponentHand.length < 6 && this.deck.length > 0) this.opponentHand.push(this.deck.pop());
                
                // If deck is empty, check for trump
                if (this.deck.length === 0 && this.trump) {
                    if (this.playerHand.length < 6) this.playerHand.push(this.trump);
                    else if (this.opponentHand.length < 6) this.opponentHand.push(this.trump);
                    this.trump = null;
                }
                this.checkEnd();
            },

            updateControls() {
                const bar = document.getElementById('action-bar');
                const btn = document.getElementById('btn-action');
                
                if (this.turn === 'me' && this.gameState === 'playing') {
                    bar.style.opacity = '1';
                    bar.style.pointerEvents = 'auto';
                    btn.textContent = this.isAttacker ? 'БИТО' : 'ВЗЯТЬ';
                    btn.disabled = this.isAttacker && this.table.length === 0;
                } else {
                    bar.style.opacity = '0';
                    bar.style.pointerEvents = 'none';
                }
            },

            checkEnd() {
                if (this.deck.length === 0 && !this.trump) {
                    if (this.playerHand.length === 0 && this.opponentHand.length === 0) this.endGame('draw');
                    else if (this.playerHand.length === 0) this.endGame('win');
                    else if (this.opponentHand.length === 0) this.endGame('lose');
                }
            },

            endGame(res) {
                this.gameState = 'over';
                const overlay = document.getElementById('overlay-result');
                const title = document.getElementById('res-title');
                const desc = document.getElementById('res-desc');
                const icon = document.getElementById('res-icon');

                overlay.style.display = 'flex';
                let amount = 0;

                if (res === 'win') {
                    this.haptic('success');
                    amount = this.bet * 1.9;
                    this.vault.balance += amount;
                    this.vault.wins++;
                    title.textContent = 'VICTORY';
                    title.className = 'text-6xl font-black italic text-metro-accent tracking-tighter';
                    desc.textContent = `You earned ${Math.floor(amount).toLocaleString()} ₽`;
                    icon.textContent = '🏆';
                } else if (res === 'lose') {
                    this.haptic('error');
                    title.textContent = 'DEFEAT';
                    title.className = 'text-6xl font-black italic text-metro-rose tracking-tighter';
                    desc.textContent = `You lost ${this.bet.toLocaleString()} ₽`;
                    icon.textContent = '💀';
                } else {
                    this.vault.balance += this.bet;
                    title.textContent = 'DRAW';
                    desc.textContent = 'Stake returned';
                    icon.textContent = '🤝';
                }

                this.vault.history.push({
                    game: 'Durak',
                    amount: res === 'win' ? amount : (res === 'lose' ? -this.bet : 0),
                    win: res === 'win',
                    date: new Date().toLocaleTimeString()
                });
                this.syncUI();
            },

            exit() {
                window.location.href = 'metro_cash_app.html';
            }
        };

        window.onload = () => Engine.init();
    </script>
</body>
</html>
